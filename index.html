    <style>

                     <div className="hidden md:block"><ArrowUp/></div>
                     <div className="block md:hidden"><ArrowDown/></div>
                     <div className="border border-blue-400 bg-white p-3 text-sm text-center shadow-sm">Defender tus opiniones ante los demás</div>
                     <div className="hidden md:block"><ArrowUp/></div>
                     <div className="block md:hidden"><ArrowDown/></div>
                     <div className="border border-blue-400 bg-white p-3 text-sm text-center shadow-sm">Enfrentar los problemas</div>
                  </div>

                  {/* Flecha conectora móvil */}
                  <div className="block md:hidden text-center order-3"><ArrowDown/></div>

                  {/* Columna Derecha (Flujo hacia abajo en el ciclo) */}

                     <div className="border border-blue-400 bg-white p-3 text-sm text-center shadow-sm">Valorar tu salud</div>
                     <ArrowDown/>
                     <div className="border border-blue-400 bg-white p-3 text-sm text-center shadow-sm">Reforzar tus aciertos</div>
                     <ArrowDown/>
                     <div className="border border-blue-400 bg-white p-3 text-sm text-center shadow-sm">Conocer tus cualidades y defectos</div>
                     <ArrowDown/>

                  </div>

               {/* Flecha conectora móvil */}

        const DiagramaDrogas = () => (
          <div className="w-full overflow-x-auto hide-scrollbar my-6">
            <div className="min-w-[500px] flex flex-col items-center bg-slate-50 py-8 rounded-xl border border-slate-200">

              <div className="w-2/3 h-px bg-slate-400 relative">

                 <div className="absolute right-0 top-0 w-px h-6 bg-slate-400"></div>
              </div>
              <div className="w-2/3 flex justify-between pt-6">
                 <div className="flex flex-col items-center w-1/2">
                   <div className="border border-blue-600 px-8 py-2 w-36 text-center bg-white text-slate-800 font-semibold shadow-sm">Duras</div>
                   <div className="w-px h-6 bg-slate-400"></div>
                   <div className="bg-blue-600 text-white p-3 w-40 text-center text-sm shadow-md">

        const DiagramaGobiernos = () => (

              <div className="w-px h-6 bg-blue-600"></div>
              <div className="w-5/6 h-px bg-blue-600 relative">
                 <div className="absolute left-0 top-0 w-px h-6 bg-blue-600"></div>

                 <div className="absolute right-0 top-0 w-px h-6 bg-blue-600"></div>

                 <div className="flex flex-col items-center w-1/3">

                 <div className="flex flex-col items-center w-1/3">

        // ==========================================
        // DATOS PRINCIPALES DE LAS SECCIONES Y QUIZ
        // ==========================================
        const studyData = [
          {
            id: 'identidad',
            title: 'Construyo mi identidad',
            desc: 'Análisis de la identidad, género, roles sociales y tradiciones.',
            icon: <IconUser />,
            color: 'blue',
            content: {
              sections: [
                {
                  subtitle: "¿Quién Soy? La Identidad Personal",
                  body: (
                    <div className="space-y-3">
                      <p>La <strong>identidad personal</strong> es un conjunto de rasgos que nos conforman y nos diferencian. Según <strong>Martin Buber</strong>, la identidad tiene 4 características clave:</p>
                      <ul className="list-disc pl-6 space-y-1 text-slate-600">
                        <li>Es relativamente <strong>estable</strong> (permanece en la vida con ligeros cambios).</li>
                        <li>Se construye dentro de un <strong>entorno social</strong>.</li>
                        <li>Se reafirma en la <strong>convivencia con los demás</strong>.</li>
                        <li>Los <strong>grupos y medios</strong> influyen, pero el individuo decide qué tomar.</li>
                      </ul>
                    </div>
                  )
                },
                {
                  subtitle: "Género y Estereotipos",
                  body: (
                    <div className="space-y-4">
                      <p>El <strong>género</strong> se refiere a las características socioculturales asignadas a hombres y mujeres (es una construcción social), distinto al <strong>sexo</strong>, que es puramente biológico.</p>
                      <div className="bg-blue-50 p-4 rounded-lg border border-blue-100">
                        <h4 className="font-bold text-blue-800 mb-1">Visión de la DSI (Doctrina Social)</h4>
                        <p className="text-sm">Considera el género como una realidad integral ligada a la biología. Promueve la <strong>complementariedad</strong> de roles sin verse como opuestos o en competencia.</p>
                      </div>
                      <DiagramaGenero />
                      <p className="text-sm text-slate-600">La sociedad ha dictado <strong>roles de género</strong> limitantes. La mayor participación de las mujeres en la vida pública y política ha modificado e invertido estos roles históricos.</p>
                    </div>
                  )
                },
                {
                  subtitle: "Grupos de Pertenencia, Tradiciones y Símbolos",
                  body: (
                    <div className="space-y-4">
                      <p>Existen grupos elegidos como las <strong>tribus urbanas</strong> (góticos, punks, gamers). Al desafiar gustos convencionales, a menudo se les tolera poco o discrimina.</p>
                      
                      <table className="study-table">
                        <thead>
                          <tr><th>Concepto</th><th>Definición y Efecto Social</th></tr>
                        </thead>
                        <tbody>
                          <tr>
                            <td className="font-semibold w-1/4">Tradiciones</td>
                            <td>Prácticas heredadas de generación en generación. Al mezclarse generan <strong>sincretismo</strong> (ej. cultura prehispánica + española).</td>
                          </tr>
                          <tr>
                            <td className="font-semibold">Costumbres</td>
                            <td>Prácticas que se vuelven hábitos y regulan a la comunidad. Incumplirlas no es delito, pero causa <strong>discriminación, exclusión y censura</strong>.</td>
                          </tr>
                          <tr>
                            <td className="font-semibold">Símbolos</td>
                            <td>Imágenes u objetos (banderas, playeras) que evocan valores/creencias, estableciendo un <strong>vínculo social de identidad</strong>.</td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  )
                }
              ]
            },
            quiz: [
              { q: "Según Martin Buber, ¿cuál característica NO pertenece a la identidad personal?", options: ["Se construye en un entorno social.", "Es relativamente estable a lo largo de la vida.", "Es inmutable y se define genéticamente al nacer.", "Se reafirma en la convivencia."], correct: 2 },
              { q: "¿Cuál es la diferencia fundamental entre sexo y género?", options: ["El género es biológico y el sexo cultural.", "El sexo es una construcción social, el género es psicológico.", "Son exactamente lo mismo.", "El sexo es biológico, el género es una construcción social y cultural."], correct: 3 },
              { q: "En el diagrama de género, ¿qué categoría se encuentra como resultado directo de la 'Subalterna'?", options: ["Hegemónica", "Masculinidad", "Marginada", "Ideológica"], correct: 2 },
              { q: "Al estereotipo ideal dominante de lo que debería ser un hombre/mujer se le denomina:", options: ["Subalterno", "Marginado", "Hegemónico", "Tradicional"], correct: 2 },
              { q: "¿Qué nombre reciben los grupos juveniles que expresan rebeldía y desafían gustos convencionales?", options: ["Hegemónicos", "Tribus urbanas o contraculturales", "Sindicatos", "Cofradías"], correct: 1 },
              { q: "La mezcla de antiguas tradiciones prehispánicas con religión católica produce:", options: ["Marginación", "Segregación", "Estigmatización", "Sincretismo"], correct: 3 },
              { q: "A diferencia de las leyes, incumplir una costumbre arraigada genera:", options: ["Cárcel", "Multas", "Repercusiones morales (censura, exclusión)", "Exilio oficial"], correct: 2 },
              { q: "¿Qué elemento evoca valores y creencias mediante objetos, imágenes o rituales?", options: ["Leyes", "Símbolos", "Costumbres", "Estatutos"], correct: 1 },
              { q: "¿Qué ha propiciado que las mujeres ingresen a espacios antes exclusivos de hombres?", options: ["Ley marcial", "Su mayor participación política, económica y necesidades sociales.", "Prohibición masculina.", "Desaparición de tribus urbanas."], correct: 1 },
              { q: "Según la DSI (Doctrina Social), la relación entre hombres y mujeres debe basarse en:", options: ["Competencia económica", "Separación absoluta de roles", "Complementariedad, siendo sus diferencias un don", "Jerarquía hegemónica"], correct: 2 }
            ]

          {
            id: 'salud',
            title: 'Derecho a la salud',
            desc: 'Autoestima, asertividad y prevención de adicciones.',
            icon: <IconHeart />,
            color: 'rose',
            content: {
              sections: [
                {
                  subtitle: "El Derecho Integral y la Autorregulación",
                  body: (
                    <div className="space-y-4">
                      <p>La <strong>Salud Integral</strong> (OMS) abarca el bienestar físico, mental y social. Está garantizada por el <strong>Art. 4°</strong> de la Constitución y el <strong>Art. 50</strong> de la Ley Gral. de Derechos de NNA.</p>
                      
                      <DiagramaCicloCuidado />

                      <p>La prevención requiere dos defensas psicológicas fundamentales:</p>
                      <ul className="list-disc pl-6 space-y-1 text-slate-600">
                        <li><strong>Asertividad:</strong> Habilidad para expresar deseos y defender derechos de forma honesta, <em>sin ser agresivos</em>.</li>
                        <li><strong>Autorregulación:</strong> Identificar situaciones de riesgo y <em>evitar acciones</em> destructivas aunque se sienta un gran deseo de realizarlas.</li>
                      </ul>
                    </div>
                  )
                },
                {
                  subtitle: "Adicciones y Drogas",
                  body: (
                    <div className="space-y-4">
                      <p>La adicción implica dependencia física, psicológica y emocional constante (crónica). Un consumo ocasional no clasifica como adicto.</p>
                      <DiagramaDrogas />
                      <p className="text-sm text-slate-600 mt-4">A largo plazo, las drogas (usadas inicialmente para calmar estrés) <strong>exacerban los problemas, provocan depresión y daños neuronales irreparables</strong>, además de fracturar la cohesión social.</p>
                    </div>
                  )
                }
              ]
            },
            quiz: [
              { q: "Según la OMS, la salud integral comprende el bienestar:", options: ["Físico y económico", "Físico, mental y social", "Únicamente biológico", "Académico y físico"], correct: 1 },
              { q: "¿Qué artículo de la Constitución obliga al Estado a garantizar el derecho a la salud?", options: ["Artículo 3°", "Artículo 4°", "Artículo 25°", "Artículo 50°"], correct: 1 },

              { q: "A largo plazo, usar drogas para evadir la tristeza o ansiedad resulta en:", options: ["Cura emocional", "Inmunidad al estrés", "Exacerbación de problemas y depresión clínica", "Mejor integración social"], correct: 2 }

          {
            id: 'vulnerables',

            color: 'emerald',
            content: {
              sections: [
                {
                  subtitle: "Dignidad Humana",
                  body: (
                    <div className="space-y-4">
                      <p>La <strong>Dignidad Humana</strong> sostiene que cada individuo posee un valor inherente. Se fundamenta en: <em>Igualdad, Autonomía, Integridad y Trato digno</em>.</p>
                      
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <div className="bg-emerald-50 p-4 rounded border border-emerald-100"><strong className="text-emerald-800 block">Vuln. Infantil</strong> Dependencia de adultos; falta de autonomía.</div>
                        <div className="bg-emerald-50 p-4 rounded border border-emerald-100"><strong className="text-emerald-800 block">Vuln. de Género</strong> Exposición a violencia/discriminación.</div>
                        <div className="bg-emerald-50 p-4 rounded border border-emerald-100"><strong className="text-emerald-800 block">Vuln. Económica</strong> Pobreza, falta de acceso a salud/educación.</div>

                  )
                },
                {
                  subtitle: "Tabla 3.1 Factores que contribuyen a la marginación",
                  body: (
                    <table className="study-table">
                      <tbody>
                        <tr><td className="w-1/4 font-semibold bg-slate-100">Discriminación</td><td>Basada en etnia, género, religión u orientación. <strong>Origina la negación de oportunidades y tratos justos.</strong></td></tr>
                        <tr><td className="font-semibold bg-slate-100">Desigualdad económica</td><td>Mala distribución de riqueza que <strong>provoca menos acceso a empleo, educación, atención médica y vivienda</strong>.</td></tr>
                        <tr><td className="font-semibold bg-slate-100">Barreras estructurales</td><td>Institucionales (segregación de vivienda/empleo). Ej: <strong>Zonas limítrofes sin agua potable, luz o internet</strong>.</td></tr>
                        <tr><td className="font-semibold bg-slate-100">Estigmatización social</td><td>Prejuicios que <strong>aíslan a personas percibidas como diferentes</strong> (ej. orientación sexual distinta).</td></tr>
                        <tr><td className="font-semibold bg-slate-100">Falta de acceso a servicios básicos</td><td>Falta de atención médica, escuelas y vivienda. <strong>Mantiene en marginación a zonas rurales e indígenas</strong>.</td></tr>
                      </tbody>
                    </table>
                  )
                }
              ]
            },
            quiz: [
              { q: "El valor inherente e inalienable por el simple hecho de ser humano es la:", options: ["Integridad moral", "Dignidad humana", "Vulnerabilidad", "Autonomía"], correct: 1 },
              { q: "Según la Tabla 3.1, negar empleo a alguien por su religión u orientación sexual es un ejemplo de:", options: ["Barrera estructural", "Estigmatización", "Discriminación", "Desigualdad económica"], correct: 2 },
              { q: "Según la Tabla 3.1, que una población en la periferia no tenga luz, agua potable ni internet se clasifica como:", options: ["Discriminación", "Falta de servicios básicos", "Estigmatización social", "Barreras estructurales"], correct: 3 },
              { q: "Aislar socialmente a un grupo por considerarlo 'diferente' (prejuicios) se conoce en la Tabla 3.1 como:", options: ["Estigmatización social", "Desigualdad económica", "Marginación infantil", "Asertividad"], correct: 0 },
              { q: "Según la Tabla 3.1, ¿qué factor mantiene en estado de marginación especialmente a las zonas rurales e indígenas?", options: ["Falta de acceso a servicios básicos", "Barreras estructurales", "Vulnerabilidad de género", "Tolerancia cultural"], correct: 0 },
              { q: "La vulnerabilidad infantil existe principalmente por:", options: ["Falta de inteligencia", "Total dependencia de adultos y falta de capacidad de autonomía", "Mala educación pública", "Desigualdad de género"], correct: 1 },
              { q: "Dentro de la dignidad, la capacidad de tomar decisiones libres corresponde a la:", options: ["Igualdad", "Integridad", "Autonomía", "Trato digno"], correct: 2 },
              { q: "La prohibición absoluta de la tortura y maltrato protege directamente tu:", options: ["Economía", "Igualdad", "Autonomía", "Integridad"], correct: 3 },
              { q: "La vulnerabilidad de género expone estadísticamente más a las mujeres a:", options: ["Mejores salarios", "Pérdida de identidad nacional", "Desigualdades, violencia y discriminación", "Falta de acceso a internet"], correct: 2 },
              { q: "La desigualdad económica se define en la tabla como la mala distribución de:", options: ["Prejuicios", "Riqueza y recursos", "Poder político", "Libertades de expresión"], correct: 1 }
            ]
          },
          {
            id: 'movimientos',
            title: 'Movimientos sociales',
            desc: 'Sistemas de gobierno, DDHH y movimientos en México.',
            icon: <IconFlag />,
            color: 'violet',
            content: {
              sections: [
                {
                  subtitle: "Formas de Violentar los Derechos Humanos",
                  body: (
                    <table className="study-table text-sm">
                      <tbody>
                        <tr>
                          <td rowSpan="3" className="w-1/4 font-bold bg-slate-200 text-center align-middle">Formas en que se violentan los derechos humanos</td>
                          <td className="bg-red-50"><strong className="text-red-800">Por acción:</strong> Se generan cuando agentes del Estado <strong>atacan directamente</strong> la dignidad (detenciones arbitrarias, tortura, desapariciones).</td>
                        </tr>
                        <tr>
                          <td className="bg-orange-50"><strong className="text-orange-800">Por omisión:</strong> Ocurren cuando el gobierno muestra <strong>indiferencia</strong> ante situaciones que vulneran derechos.</td>
                        </tr>
                        <tr>
                          <td className="bg-yellow-50"><strong className="text-yellow-800">Por aquiescencia:</strong> El Estado da el <strong>consentimiento directo</strong> permitiendo secuestros o agresiones por parte de terceros (ej. grupos paramilitares).</td>
                        </tr>
                      </tbody>
                    </table>
                  )
                },
                {
                  subtitle: "Tabla 4.1 Generaciones de los Derechos Humanos",
                  body: (
                    <table className="study-table text-xs">
                      <thead>
                        <tr>
                          <th className="w-1/3 text-center">Primera generación<br/><span className="font-normal text-slate-500">Civiles y políticos</span></th>
                          <th className="w-1/3 text-center">Segunda generación<br/><span className="font-normal text-slate-500">Económicos, sociales y culturales</span></th>
                          <th className="w-1/3 text-center">Tercera generación<br/><span className="font-normal text-slate-500">Derechos de solidaridad</span></th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr>
                          <td className="px-4">
                            <ul className="list-disc pl-2 space-y-1">
                              <li>Derecho a la vida, igualdad, libertad</li>
                              <li>Nacionalidad, privacidad</li>
                              <li>Libertad de expresión y religiosa</li>
                              <li>Juicio justo y sufragio</li>
                            </ul>
                          </td>
                          <td className="px-4">
                            <ul className="list-disc pl-2 space-y-1">
                              <li>Trabajo, condiciones laborales, huelga</li>
                              <li>Nivel de vida y vivienda digna</li>
                              <li>Salud y educación</li>
                              <li>Vida cultural, ciencia, tecnología y ambiente</li>
                            </ul>
                          </td>
                          <td className="px-4">
                            <ul className="list-disc pl-2 space-y-1">
                              <li>Autodeterminación, independencia</li>
                              <li>Identidad nacional, paz, coexistencia</li>
                              <li>Cooperación/justicia internacional</li>
                              <li>Uso de la ciencia, ambiente, patrimonio común y desarrollo digno</li>
                            </ul>
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  )
                },
                {
                  subtitle: "Tipos de Gobierno y Tabla 4.3 de Movimientos",
                  body: (
                    <div className="space-y-6">
                      <DiagramaGobiernos />
                      <p>Los <strong>movimientos sociales</strong> visibilizan injusticias y piden mejoras para todos. Los <strong>políticos</strong> buscan alcanzar el poder.</p>
                      
                      <table className="study-table text-xs">
                        <thead>
                          <tr><th>Movimiento</th><th>Tipo</th><th>Periodo</th><th>Demandas</th></tr>
                        </thead>
                        <tbody>
                          <tr><td className="font-bold">Ejército Cristero</td><td>Social</td><td>1926-1929</td><td>Respeto a profesión religiosa.</td></tr>
                          <tr><td className="font-bold">Médicos y enfermeras</td><td>Social</td><td>1964-1965</td><td>Mejores condiciones laborales.</td></tr>
                          <tr><td className="font-bold">Huelga ferrocarrilera</td><td>Social</td><td>1959</td><td>Mejores condiciones laborales.</td></tr>
                          <tr><td className="font-bold">Estudiantil 1968</td><td>Social</td><td>1968</td><td>Democratización del país.</td></tr>
                          <tr><td className="font-bold">Partido de los Pobres</td><td>Político</td><td>1967-1974</td><td>Contra asesinatos de campesinos en Gro.</td></tr>
                          <tr><td className="font-bold">Liga Com. 23 de Sept.</td><td>Político</td><td>1973-1983</td><td>Construcción de gobierno socialista.</td></tr>
                          <tr><td className="font-bold">Mov. Acción Revoluc.</td><td>Político</td><td>1969-1979</td><td>Democratización del país.</td></tr>
                          <tr><td className="font-bold">EZLN</td><td>Político</td><td>1994</td><td>Derechos de pueblos indígenas.</td></tr>
                          <tr><td className="font-bold">CGH, UNAM</td><td>Social</td><td>1999-2000</td><td>Defensa de educación pública/gratuita.</td></tr>
                          <tr><td className="font-bold">#YoSoy132</td><td>Social</td><td>2012</td><td>Contra violaciones de derechos.</td></tr>
                        </tbody>
                      </table>
                    </div>
                  )
                }
              ]
            },
            quiz: [
              { q: "Si las autoridades permiten abiertamente y dan su consentimiento para que un grupo paramilitar torture, cometen violación por:", options: ["Acción", "Omisión", "Aquiescencia", "Corrupción"], correct: 2 },
              { q: "Si el Estado muestra indiferencia y no hace nada ante reportes de violencia, la violación es por:", options: ["Acción", "Aquiescencia", "Marginación", "Omisión"], correct: 3 },
              { q: "De acuerdo a la Tabla 4.1, los derechos a la salud, vivienda digna y educación pertenecen a:", options: ["Primera generación", "Segunda generación", "Tercera generación", "Cuarta generación"], correct: 1 },
              { q: "Según la Tabla 4.1, la 'libertad de expresión' y el 'sufragio' pertenecen a los derechos:", options: ["Civiles y políticos (1ra Gen)", "De Solidaridad (3ra Gen)", "Económicos y sociales (2da Gen)", "Culturales (2da Gen)"], correct: 0 },
              { q: "Según el diagrama de Tipos de Gobierno, ¿cuál busca ELIMINAR el pensamiento opuesto con propaganda y adoctrinamiento?", options: ["Democrático", "Autoritario", "Totalitario", "Conservador"], correct: 2 },
              { q: "Según la Tabla 4.3, ¿qué tipo de movimiento fue el Ejército Zapatista de Liberación Nacional (EZLN) en 1994?", options: ["Social", "Político", "Sindical", "Estudiantil"], correct: 1 },
              { q: "Según la Tabla 4.3, el movimiento estudiantil de 1968 fue de tipo 'Social' y exigía:", options: ["Derechos indígenas", "Educación pública gratuita", "Profesión religiosa", "Democratización del país"], correct: 3 },
              { q: "La principal diferencia entre un movimiento social y uno político es que el político busca:", options: ["Mejores salarios", "Alcanzar el poder político", "Crear arte urbano", "Revolución religiosa"], correct: 1 },
              { q: "Según la Tabla 4.3, ¿qué demandaba el movimiento de Médicos y enfermeras (1964-1965)?", options: ["Gobierno socialista", "Derechos indígenas", "Mejores condiciones laborales", "Alto a la violencia"], correct: 2 },
              { q: "Legal y constitucionalmente, ¿quién es el único ente que puede 'violentar' los Derechos Humanos?", options: ["Crimen organizado", "Agentes e instituciones del Estado", "Empresas privadas", "Cualquier civil armado"], correct: 1 }
            ]
          }
        ];

        // ==========================================
        // VISTAS DE NAVEGACIÓN (SPA)
        // ==========================================
        const Landing = ({ onSelect }) => (
          <div className="max-w-6xl mx-auto px-4 py-12 fade-in">
            <div className="text-center mb-16">
              <h1 className="text-4xl md:text-5xl font-bold text-slate-800 mb-4 font-poppins">
                Formación Cívica y Ética <span className="text-blue-600">2° Grado</span>
              </h1>
              <p className="text-lg text-slate-500 max-w-2xl mx-auto">
                Guía de Estudio Avanzada con diagramas interactivos. Selecciona un tema para estudiar la teoría completa y ponte a prueba con el examen final.
              </p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8">
              {studyData.map((module) => (
                <div key={module.id} onClick={() => onSelect(module.id)} className={`bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-200 hover:shadow-xl hover:border-${module.color}-400 transition-all duration-300 cursor-pointer group flex flex-col items-center text-center`}>
                  <div className={`w-16 h-16 rounded-2xl bg-${module.color}-50 text-${module.color}-600 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300`}>{module.icon}</div>
                  <h2 className="text-2xl font-bold text-slate-800 mb-3 group-hover:text-blue-600 transition-colors font-poppins">{module.title}</h2>
                  <p className="text-slate-500 mb-6 flex-grow">{module.desc}</p>
                  <div className={`text-${module.color}-600 font-semibold flex items-center gap-2 uppercase tracking-wide text-sm`}>Estudiar y Evaluar &rarr;</div>
                </div>
              ))}
            </div>
          </div>
        );

        const QuizSystem = ({ questions, color }) => {
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          const [showResults, setShowResults] = useState(false);
          const [answers, setAnswers] = useState([]);
          const [selectedOption, setSelectedOption] = useState(null);

          const handleAnswer = () => {
            if (selectedOption === null) return;
            const isCorrect = selectedOption === questions[currentQ].correct;
            setAnswers([...answers, { qIndex: currentQ, selected: selectedOption, isCorrect }]);
            if (isCorrect) setScore(score + 1);
            if (currentQ < questions.length - 1) { setCurrentQ(currentQ + 1); setSelectedOption(null); } 
            else { setShowResults(true); }
          };

          const resetQuiz = () => { setCurrentQ(0); setScore(0); setShowResults(false); setAnswers([]); setSelectedOption(null); };

          if (showResults) {
            const passed = score >= 7;
            return (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 fade-in max-w-4xl mx-auto">
                <div className="text-center mb-8">
                  <h3 className="text-3xl font-bold text-slate-800 mb-2 font-poppins">Resultados del Examen</h3>
                  <div className={`inline-block px-6 py-3 rounded-full text-2xl font-bold mb-4 ${passed ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{score} / 10</div>
                  <p className="text-slate-600 font-medium">{passed ? '¡Excelente trabajo! Tienes un dominio analítico de las tablas y diagramas.' : 'Se recomienda repasar los diagramas y tablas en la sección teórica.'}</p>
                </div>
                <div className="space-y-6">
                  {questions.map((q, idx) => {
                    const ans = answers.find(a => a.qIndex === idx);
                    return (
                      <div key={idx} className={`p-5 rounded-xl border ${ans.isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                        <p className="font-semibold text-slate-800 mb-3">{idx + 1}. {q.q}</p>
                        <div className="text-sm space-y-2">
                          {!ans.isCorrect && <div className="flex items-start gap-2 text-red-700"><IconX /> <span className="line-through opacity-80">{q.options[ans.selected]}</span></div>}
                          <div className="flex items-start gap-2 text-green-700 font-medium"><IconCheck /> <span>{q.options[q.correct]}</span></div>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <button onClick={resetQuiz} className={`mt-8 w-full py-4 rounded-xl text-white font-bold bg-${color}-600 hover:bg-${color}-700 transition-colors`}>Reintentar Quiz</button>
              </div>
            );
          }

          const q = questions[currentQ];
          return (
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 fade-in max-w-4xl mx-auto">
              <div className="flex justify-between items-center mb-6">
                <span className={`text-${color}-600 font-bold uppercase tracking-wider text-sm`}>Pregunta {currentQ + 1} de 10</span>
                <span className="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-sm font-semibold border border-slate-200">Alta Dificultad</span>
              </div>
              <h3 className="text-xl md:text-2xl font-semibold text-slate-800 mb-8 leading-relaxed">{q.q}</h3>
              <div className="space-y-3 mb-8">
                {q.options.map((opt, idx) => (
                  <button key={idx} onClick={() => setSelectedOption(idx)} className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-center ${selectedOption === idx ? `border-${color}-500 bg-${color}-50 shadow-sm` : 'border-slate-200 hover:border-slate-300 hover:bg-slate-50'}`}>
                    <span className={`inline-flex shrink-0 w-8 h-8 rounded-full items-center justify-center font-bold mr-4 ${selectedOption === idx ? `bg-${color}-500 text-white` : 'bg-slate-200 text-slate-600'}`}>{String.fromCharCode(65 + idx)}</span>
                    <span className="font-medium text-slate-700 leading-tight">{opt}</span>
                  </button>
                ))}
              </div>
              <button onClick={handleAnswer} disabled={selectedOption === null} className={`w-full py-4 rounded-xl text-white font-bold text-lg transition-all duration-200 ${selectedOption === null ? 'bg-slate-300 cursor-not-allowed opacity-70' : `bg-${color}-600 hover:bg-${color}-700 shadow-md`}`}>
                {currentQ === 9 ? 'Finalizar Examen' : 'Siguiente Pregunta'}
              </button>
            </div>
          );
        };

        const SectionView = ({ sectionId, onBack }) => {
          const module = studyData.find(s => s.id === sectionId);
          const [viewMode, setViewMode] = useState('theory');
          useEffect(() => { window.scrollTo(0, 0); }, [viewMode]);

          return (
            <div className="max-w-6xl mx-auto px-4 py-8 fade-in">
              <button onClick={onBack} className="flex items-center gap-2 text-slate-500 hover:text-blue-600 font-medium mb-8 transition-colors bg-white px-4 py-2 rounded-lg shadow-sm border border-slate-200 inline-flex"><IconHome /> Volver al Inicio</button>

              <div className={`bg-gradient-to-r from-slate-900 to-slate-800 rounded-3xl p-8 md:p-12 mb-8 text-white shadow-xl flex items-center gap-6`}>
                <div className={`p-4 bg-white/10 rounded-2xl hidden md:block text-${module.color}-400`}>{module.icon}</div>
                <div>
                  <h1 className="text-3xl md:text-5xl font-bold mb-4 font-poppins">{module.title}</h1>
                  <p className="text-slate-300 text-lg max-w-2xl">{module.desc}</p>
                </div>
              </div>

              <div className="flex space-x-2 mb-8 bg-slate-200 p-1 rounded-xl max-w-md mx-auto">
                <button onClick={() => setViewMode('theory')} className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-semibold transition-colors ${viewMode === 'theory' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'}`}><IconBook /> Teoría y Tablas</button>
                <button onClick={() => setViewMode('quiz')} className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-semibold transition-colors ${viewMode === 'quiz' ? `bg-${module.color}-600 text-white shadow-sm` : 'text-slate-500 hover:text-slate-700'}`}><IconCheck /> Quiz Evaluativo</button>
              </div>

              {viewMode === 'theory' ? (
                <div className="fade-in space-y-8 max-w-5xl mx-auto">
                  {module.content.sections.map((sec, idx) => (
                    <div key={idx} className="bg-white rounded-2xl p-6 md:p-10 shadow-sm border border-slate-200 overflow-hidden">
                      <h3 className={`text-2xl font-bold text-${module.color}-700 mb-6 border-b-2 border-slate-100 pb-3 font-poppins`}>{sec.subtitle}</h3>
                      <div className="text-slate-700 text-lg leading-relaxed">{sec.body}</div>
                    </div>
                  ))}
                </div>
              ) : ( <QuizSystem questions={module.quiz} color={module.color} /> )}
            </div>
          );
        };

        const App = () => {
          const [currentView, setCurrentView] = useState('landing');
          const [activeSection, setActiveSection] = useState(null);
          const navigateToSection = (id) => { setActiveSection(id); setCurrentView('section'); window.scrollTo(0,0); };
          return <div>{currentView === 'landing' ? <Landing onSelect={navigateToSection} /> : <SectionView sectionId={activeSection} onBack={() => setCurrentView('landing')} />}</div>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
