                keywords: [
                    { term: "Negociación", definition: "Comunicación directa entre las partes para un acuerdo." },
                    { term: "Mediación", definition: "Intervención de un tercero imparcial que facilita la comunicación." },
                    { term: "Conciliación", definition: "Proceso donde el tercero conciliador puede proponer soluciones." }
                ],
                articles: [],
                extraHtml: "",
                quiz: [
                    {
                        question: "En un conflicto entre vecinos, deciden llamar a un profesor respetado. El profesor escucha a ambos y les dice: 'Considero que lo más justo es que ambos paguen la mitad del muro'. Este es un ejemplo de:",
                        options: ["Negociación", "Mediación", "Conciliación", "Juicio Arbitral"],
                        correctAnswer: 2,
                        explanation: "Es Conciliación porque el tercero (profesor) *propuso activamente una solución* (pagar mitad y mitad). Si hubiera sido Mediación, el profesor solo les habría ayudado a hablar, pero ellos habrían ideado la solución solos."
                    },
                    {
                        question: "¿Qué característica principal separa a la 'Negociación' del resto de los Mecanismos Alternativos (MASC)?",
                        options: [
                            "Requiere obligatoriamente un abogado.",
                            "No intervienen terceras personas externas; es comunicación directa entre las partes.",
                            "Se debe registrar ante un juez civil.",
                            "Una de las partes siempre resulta perdedora."
                        ],
                        correctAnswer: 1,
                        explanation: "La negociación es el mecanismo más directo porque sucede de manera independiente y exclusiva entre los involucrados en el conflicto."
                    },
                    {
                        question: "El rol principal de un 'Mediador' durante un conflicto escolar es:",
                        options: [
                            "Decidir quién es el culpable y aplicar un reporte disciplinario.",
                            "Fungir como abogado defensor de la víctima.",
                            "Facilitar la comunicación para que las partes involucradas encuentren su propia solución.",
                            "Imponer una alternativa de solución que le parezca más justa."
                        ],
                        correctAnswer: 2,
                        explanation: "Un mediador es neutral, no juzga, no castiga y, muy importante, NO propone la solución. Solo reestablece el puente de comunicación."
                    },
                    {
                        question: "A diferencia de un juicio tradicional largo donde hay un 'ganador y un perdedor', los MASC (Mecanismos Alternativos) promueven un modelo de solución del tipo:",
                        options: ["Ganar-Ganar", "Suma cero", "Perder-Perder", "Veto mutuo"],
                        correctAnswer: 0,
                        explanation: "La naturaleza de los mecanismos pacíficos busca acuerdos mutuamente beneficiosos, donde ambas partes sientan que se resolvieron sus necesidades (Ganar-Ganar)."
                    },
                    {
                        question: "Un conciliador NO tiene la capacidad de obligar a las partes a cumplir su solución, sino que solo:",
                        options: [
                            "Las demanda judicialmente.",
                            "Dicta sentencia como un juez cívico.",
                            "Les propone la alternativa y deja que las partes decidan voluntariamente si la aceptan.",
                            "Sanciona económicamente a quien no le haga caso."
                        ],
                        correctAnswer: 2,
                        explanation: "La conciliación sigue siendo un mecanismo alternativo voluntario. El conciliador propone, pero la decisión de aceptar recae 100% en las partes involucradas."
                    }
                ]
            }
        ];

        let activeTopicId = 1;
        let isSidebarOpen = false;
        
        // Variables de estado para el Quiz
        let currentQuizAnswers = {};
        let isQuizSubmitted = false;

        // Inicialización
        function init() {
            renderSidebar();
            renderContent(activeTopicId);

            document.getElementById('menuBtn').addEventListener('click', toggleSidebar);
            document.getElementById('sidebarOverlay').addEventListener('click', () => {
                if(isSidebarOpen) toggleSidebar();
            });
        }

        // Control de menú móvil
        function toggleSidebar() {
            isSidebarOpen = !isSidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const menuBtnIcon = document.getElementById('menuBtn');

            if(isSidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                menuBtnIcon.innerHTML = '<i data-lucide="x"></i>';
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                menuBtnIcon.innerHTML = '<i data-lucide="menu"></i>';
            }
            lucide.createIcons();
        }

        // Renderiza la lista del menú lateral
        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = topicsData.map(topic => `
                <button onclick="selectTopic(${topic.id})" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-left ${activeTopicId === topic.id ? 'bg-blue-50 text-blue-700 font-semibold shadow-sm border border-blue-100' : 'hover:bg-slate-100 text-slate-600'}">
                    <div class="${activeTopicId === topic.id ? 'text-blue-600' : 'text-slate-400'}">
                        <i data-lucide="${topic.icon}" class="w-5 h-5"></i>
                    </div>
                    <span class="flex-1 text-sm leading-tight">${topic.title}</span>
                    ${activeTopicId === topic.id ? '<i data-lucide="chevron-right" class="w-4 h-4 text-blue-600"></i>' : ''}
                </button>
            `).join('');
            
            lucide.createIcons();
        }

        // Cambia de tema
        function selectTopic(id) {
            activeTopicId = id;
            currentQuizAnswers = {};
            isQuizSubmitted = false;
            
            renderSidebar();
            renderContent(id);
            // Hacer scroll hacia arriba al cambiar de tema
            window.scrollTo({top: 0, behavior: 'smooth'});
            // Cerrar menú en móviles
            if(window.innerWidth < 768 && isSidebarOpen) {
                toggleSidebar();
            }
        }

        // Control de respuesta del Quiz
        window.handleQuizChange = function(questionIndex, optionIndex) {
            currentQuizAnswers[questionIndex] = optionIndex;
            renderQuizBlock();
        }

        // Calificar Quiz
        window.submitQuiz = function() {
            const topic = topicsData.find(t => t.id === activeTopicId);
            const totalQuestions = topic.quiz.length;
            
            // Verificar si contestó todas (opcional, por ahora calificamos lo que haya)
            if(Object.keys(currentQuizAnswers).length < totalQuestions) {
                if(!confirm("No has respondido todas las preguntas. ¿Seguro que deseas calificar ahora?")) return;
            }
            
            isQuizSubmitted = true;
            renderQuizBlock();
        }

        // Reintentar Quiz
        window.resetQuiz = function() {
            currentQuizAnswers = {};
            isQuizSubmitted = false;
            renderQuizBlock();
        }

        // Renderiza SOLO el bloque del Quiz (Para no afectar el resto de la página al dar clic)
        function renderQuizBlock() {
            const container = document.getElementById('quizContainer');
            if(!container) return;
            
            const topic = topicsData.find(t => t.id === activeTopicId);
            if(!topic.quiz || topic.quiz.length === 0) return;

            let quizHtml = `
                <section class="mt-12 bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-md">
                    <h3 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2 border-b pb-4">
                        <i data-lucide="brain-circuit" class="w-6 h-6 text-blue-600"></i>
                        Quiz de Autoevaluación
                    </h3>
                    <div class="space-y-8">
            `;
            
            topic.quiz.forEach((q, qIndex) => {
                quizHtml += `<div class="space-y-4">
                    <p class="font-bold text-slate-800 text-lg leading-snug"><span class="text-blue-600 mr-1">${qIndex + 1}.</span> ${q.question}</p>
                    <div class="space-y-2">`;
                
                q.options.forEach((opt, optIndex) => {
                    const isSelected = currentQuizAnswers[qIndex] === optIndex;
                    const isCorrect = q.correctAnswer === optIndex;
                    
                    let optionClasses = "p-3 rounded-xl border transition-all flex items-start gap-3 w-full text-left ";
                    let iconHtml = `<div class="w-5 h-5 rounded-full border border-slate-400 flex-shrink-0 mt-0.5"></div>`;
                    
                    let onChangeEvent = '';
                    if (!isQuizSubmitted) {
                        optionClasses += "cursor-pointer hover:border-blue-400 hover:bg-slate-50 ";
                        optionClasses += isSelected ? "border-blue-500 bg-blue-50 ring-1 ring-blue-500" : "border-slate-200";
                        if (isSelected) iconHtml = `<div class="w-5 h-5 rounded-full bg-blue-600 border-2 border-white ring-2 ring-blue-600 flex-shrink-0 mt-0.5"></div>`;
                        onChangeEvent = 'onchange="handleQuizChange(' + qIndex + ', ' + optIndex + ')"';
                    } else {
                        optionClasses += "cursor-default ";
                        if (isCorrect) {
                            optionClasses += "border-green-500 bg-green-50 text-green-900 font-medium";
                            iconHtml = `<i data-lucide="check-circle-2" class="w-6 h-6 text-green-600 flex-shrink-0"></i>`;
                        } else if (isSelected && !isCorrect) {
                            optionClasses += "border-red-500 bg-red-50 text-red-900";
                            iconHtml = `<i data-lucide="x-circle" class="w-6 h-6 text-red-600 flex-shrink-0"></i>`;
                        } else {
                            optionClasses += "border-slate-200 opacity-50";
                            iconHtml = `<div class="w-5 h-5 rounded-full border border-slate-300 flex-shrink-0 mt-0.5"></div>`;
                        }
                    }

                    quizHtml += `
                        <label class="${optionClasses}">
                            <input type="radio" name="q-${qIndex}" value="${optIndex}" class="hidden" 
                                ${onChangeEvent}
                                ${isQuizSubmitted ? 'disabled' : ''}
                                ${isSelected ? 'checked' : ''}
                            >
                            ${iconHtml}
                            <span class="text-sm md:text-base leading-snug">${opt}</span>
                        </label>
                    `;
                });
                
                // Explicación de la respuesta (Visible solo si se envió el quiz)
                if (isQuizSubmitted) {
                    quizHtml += `
                        <div class="mt-3 text-sm md:text-base p-4 rounded-xl bg-blue-50 border border-blue-100 text-blue-900 flex gap-3 animate-fade-slide">
                            <i data-lucide="info" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
                            <div>
                                <b>Explicación:</b> ${q.explanation}
                            </div>
                        </div>`;
                }

                quizHtml += `</div></div>`;
            });
            
            if (!isQuizSubmitted) {
                quizHtml += `
                    <div class="pt-6 border-t mt-8">
                        <button onclick="submitQuiz()" class="w-full md:w-auto bg-blue-700 text-white font-bold py-3 px-8 rounded-xl hover:bg-blue-800 transition-colors shadow-lg flex items-center justify-center gap-2">
                            <i data-lucide="check-square" class="w-5 h-5"></i>
                            Calificar mis respuestas
                        </button>
                    </div>`;
            } else {
                // Calcular score final
                let correctCount = 0;
                topic.quiz.forEach((q, idx) => {
                    if (currentQuizAnswers[idx] === q.correctAnswer) correctCount++;
                });
                const scorePercent = Math.round((correctCount / topic.quiz.length) * 100);
                
                let resultColor = scorePercent >= 80 ? 'text-green-600' : scorePercent >= 60 ? 'text-amber-600' : 'text-red-600';
                
                quizHtml += `
                    <div class="mt-10 p-8 bg-slate-50 border-2 border-slate-200 rounded-2xl text-center shadow-inner animate-fade-slide">
                        <h4 class="text-3xl font-black text-slate-800 mb-3">Tu Resultado: <span class="${resultColor}">${correctCount} / ${topic.quiz.length}</span></h4>
                        <p class="text-slate-600 text-lg mb-8 font-medium">Obtuviste un ${scorePercent}% de aciertos.</p>
                        <button onclick="resetQuiz()" class="bg-slate-200 text-slate-800 font-bold py-3 px-8 rounded-xl hover:bg-slate-300 transition-colors shadow-sm flex items-center justify-center gap-2 mx-auto">
                            <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                            Volver a intentar
                        </button>
                    </div>
                `;
            }
            
            quizHtml += `</div></section>`;
            container.innerHTML = quizHtml;
            lucide.createIcons();
        }

        // Renderiza el contenido completo del tema seleccionado
        function renderContent(id) {
            const topic = topicsData.find(t => t.id === id);
            const main = document.getElementById('mainContent');

            // Reinicia animación
            main.classList.remove('animate-fade-slide');
            void main.offsetWidth; 
            main.classList.add('animate-fade-slide');

            // Preparando de forma segura el contenido interno del video para evitar problemas de parsing con JS
            let videoInnerHtml = "";
            if (topic.videoUrl) {
                videoInnerHtml = '<iframe src="' + topic.videoUrl + '" class="w-full h-full absolute inset-0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
            } else {
                videoInnerHtml = '<div class="text-center p-6 text-slate-500"><i data-lucide="play-circle" class="w-16 h-16 mx-auto mb-3 text-slate-400 group-hover:text-blue-500 transition-colors"></i><p class="font-bold text-lg text-slate-600">Video en preparación</p><p class="text-sm mt-2 max-w-sm mx-auto">Pronto se añadirá aquí el video resumen generado con NotebookLM.<br>(Edita la propiedad <code>videoUrl</code> en el código para agregarlo).</p></div>';
            }

            // HTML del Video Resumen
            let videoHtml = `
                <section class="mt-8">
                    <h3 class="text-xl font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2">
                        <i data-lucide="video" class="w-6 h-6 text-red-600"></i>
                        Video Resumen (NotebookLM)
                    </h3>
                    <div class="aspect-video bg-slate-100 rounded-xl overflow-hidden border-2 border-dashed border-slate-300 shadow-sm flex items-center justify-center relative group transition-all hover:border-blue-400">
                        ${videoInnerHtml}
                    </div>
                </section>
            `;

            // HTML de Apuntes Clave para el Examen
            let examPointsHtml = '';
            if(topic.examPoints && topic.examPoints.length > 0) {
                examPointsHtml = `
                    <section class="bg-amber-50 border-l-4 border-amber-500 p-6 rounded-r-xl shadow-sm my-6">
                        <h3 class="text-xl font-bold text-amber-900 mb-4 flex items-center gap-2">
                            🎯 Apuntes Clave para el Examen
                        </h3>
                        <ul class="list-disc pl-5 space-y-3 text-amber-900 text-[15px]">
                            ${topic.examPoints.map(point => `<li>${point}</li>`).join('')}
                        </ul>
                    </section>
                `;
            }

            // HTML de Palabras clave
            let keywordsHtml = topic.keywords.map(kw => `
                <div class="bg-slate-50 border border-slate-100 p-4 rounded-xl shadow-sm">
                    <h4 class="font-bold text-blue-700 mb-2">${kw.term}</h4>
                    <p class="text-sm text-slate-600 leading-relaxed">${kw.definition}</p>
                </div>
            `).join('');

            // HTML de Artículos Ejecutivos
            let articlesHtml = '';
            if(topic.articles && topic.articles.length > 0) {
                articlesHtml = `
                    <section class="mt-8">
                      <h3 class="text-xl font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2">
                        ⚖️ Artículos Constitucionales Relevantes
                      </h3>
                      <div class="space-y-4">
                        ${topic.articles.map(art => `
                            <div class="flex gap-4 p-4 bg-blue-50/50 border border-blue-100 rounded-xl">
                                <div class="flex-shrink-0 mt-1 text-blue-600">
                                    <i data-lucide="scale" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-blue-900 mb-1 tracking-wide">${art.article}</h4>
                                    <p class="text-slate-700 text-sm leading-relaxed">${art.description}</p>
                                </div>
                            </div>
                        `).join('')}
                      </div>
                    </section>
                `;
            }

            // Unir toda la vista
            main.innerHTML = `
                <div class="bg-gradient-to-r from-blue-700 to-blue-900 p-6 md:p-8 text-white relative overflow-hidden">
                  <div class="flex items-center gap-3 mb-4 text-blue-200 relative z-10">
                    <i data-lucide="${topic.icon}" class="w-5 h-5"></i>
                    <span class="text-sm font-semibold uppercase tracking-wider">Tema ${topic.id}</span>
                  </div>
                  <h2 class="text-3xl md:text-4xl font-bold mb-6 relative z-10 leading-tight">${topic.title}</h2>
                  <a href="${topic.driveLink}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 bg-white text-blue-800 px-5 py-2.5 rounded-lg font-bold text-sm hover:bg-blue-50 transition-colors shadow-sm relative z-10">
                    <i data-lucide="external-link" class="w-4 h-4"></i>
                    Abrir Lectura en Drive
                  </a>
                  <i data-lucide="${topic.icon}" class="absolute -right-4 -bottom-4 w-48 h-48 text-white opacity-10 rotate-12"></i>
                </div>

                <div class="px-6 py-8 md:px-8 space-y-8">
                  <section>
                    <h3 class="text-xl font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2">
                      📌 Resumen Principal
                    </h3>
                    <p class="text-slate-600 leading-relaxed text-lg">${topic.summary}</p>
                  </section>
                  
                  ${videoHtml}
                  
                  ${examPointsHtml}
                  
                  <section>
                    <h3 class="text-xl font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2">
                      🧠 Conceptos Clave
                    </h3>
                    <div class="grid gap-4 md:grid-cols-2">
                      ${keywordsHtml}
                    </div>
                  </section>
                  
                  ${articlesHtml}
                  
                  <!-- HTML Extra (Tablas y Diagramas) -->
                  ${topic.extraHtml}
                  
                  <!-- Contenedor Dinámico para el Quiz -->
                  <div id="quizContainer"></div>
                </div>
            `;
            
            // Inyectar el Quiz después de crear el HTML principal
            renderQuizBlock();
        }

        // Correr inicialización al cargar la página
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
