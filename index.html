        // DATOS PRINCIPALES DE LAS SECCIONES Y QUIZ

        const studyData = [
          {
            id: 'identidad',
            title: 'Construyo mi identidad',
            desc: 'Conformación de las identidades juveniles, género, roles, grupos y tradiciones.',
            icon: <IconUser />,
            color: 'blue',
            content: {
              sections: [
                {
                  subtitle: "Conformación de las identidades juveniles y ¿Quién soy?",
                  body: (
                    <div className="space-y-4">
                      <p>¿Alguna vez te has preguntado "quién soy"? Seguramente, cuando te has mirado al espejo, en distintos momentos de tu vida, te has respondido de diferentes maneras. Esta pregunta es necesaria para que puedas tomar conciencia de ti y de cuál es el sentido y el valor que tiene para ti vivir plenamente.</p>
                      <p>Pero, ¿te has cuestionado quiénes son los demás?, ¿qué cualidades nos hace semejantes y cuáles nos hacen diferentes?, ¿qué representan para mí y como influyen en mi forma de ser, pensar, sentir, creer y actuar? Estas relaciones con las personas permiten que te des cuenta de quién eres, es decir, que descubras y construyas tu identidad.</p>
                      <p>La <strong>identidad personal</strong> se refiere a un conjunto de rasgos o características que nos conforman como individuos, nos hacen únicos como personas y nos diferencian de los demás. Ésta se constituye a partir de varios elementos a lo largo de la vida de una persona, sobre todo en las etapas de la infancia, adolescencia y la juventud, en las que desarrollamos nuestro ser y nuestra personalidad, junto con el crecimiento físico.</p>
                      <p>Según <strong>Martin Buber</strong>, la identidad personal tiene, al menos, cuatro características:</p>
                      <ul className="list-disc pl-6 space-y-2 text-slate-700">
                        <li>Es relativamente estable, es decir, <strong>permanece a lo largo de la vida</strong>, aun con ligeros cambios.</li>
                        <li>Se <strong>construye dentro de un entorno social</strong>.</li>
                        <li>Se <strong>reafirma en la convivencia</strong> con los demás, o sea, una persona la construye a partir de sus gustos, deseos y afinidades que tiene con los demás.</li>
                        <li>Los <strong>grupos sociales y los medios de comunicación</strong> influyen en cada persona aunque cada uno toma de ellos lo que considera conveniente.</li>
                      </ul>
                    </div>
                  )
                },
                {
                  subtitle: "Género y Roles de Género",
                  body: (
                    <div className="space-y-4">
                      <p>El concepto de <strong>género</strong> se refiere a las características sociales, culturales y psicológicas asociadas a las diferencias entre hombres y mujeres en una sociedad determinada. A menudo, se distingue del <strong>sexo</strong>, que se refiere a las diferencias biológicas entre machos y hembras de una especie. Así, el género es una construcción social y cultural que define y asocia lo masculino con los hombres y lo femenino con las mujeres, en un lugar, un tiempo y una sociedad determinados.</p>
                      
                      <div className="bg-blue-50 p-5 rounded-lg border border-blue-100">
                        <h4 className="font-bold text-blue-800 mb-2">La Relación entre Género y Teología en la DSI (Doctrina Social)</h4>
                        <p className="mb-2 text-slate-800">El término "género", tal como se usa en la discusión actual, a menudo se enfoca en la construcción social y cultural, a veces separándolo de la realidad biológica. La Iglesia, por su parte, ve el género como una realidad integral que no puede separarse de la persona en su totalidad (cuerpo y alma).</p>
                        <ul className="list-disc pl-5 space-y-1 text-slate-800">
                            <li><strong>Identidad Integral:</strong> La visión católica considera que la identidad de género está profundamente arraigada en la realidad biológica del ser hombre o mujer. Para la DSI, una sociedad que ignora o distorsiona esta realidad crea problemas para el bien común. Por ejemplo, una cultura que devalúa la maternidad o la paternidad, afecta la estructura fundamental de la familia y de la sociedad.</li>
                            <li><strong>Roles y Complementariedad:</strong> Esto no significa que los roles de género deban ser rígidos o que las mujeres y los hombres no puedan participar en las mismas actividades. Lo que sí significa es que sus diferencias son un don, y que una sociedad sana promueve un espacio donde tanto lo femenino como lo masculino puedan florecer de manera <strong>complementaria</strong>, sin ser vistos como opuestos o en competencia. La DSI promueve una sociedad donde hombres y mujeres trabajen juntos para el bien de todos.</li>
                        </ul>
                      </div>

                      <p>A partir de las significaciones asignadas a las mujeres y los hombres, se distribuyen los <strong>roles de género</strong> que desempeñan en la sociedad. Estos roles se refieren a las expectativas sociales y culturales sobre cómo deben comportarse las personas en función de su género, y pueden variar ampliamente en diferentes culturas y períodos de tiempo.</p>
                      <p>De esta manera, por mucho tiempo se ha asignado a las mujeres una mayor participación en las actividades del hogar y del cuidado de los integrantes de la familia, por considerar que son actividades propias de su sexo; mientras que los hombres han ejercido el papel de proveedores y, por lo tanto, se les ha visto como los responsables de desarrollar trabajos fuera de casa para obtener recursos económicos y materiales que la familia necesita. Estas ideas y prácticas han limitado las posibilidades, potencialidades y objetivos de vida de ambos sexos, restringiéndolos. Sin embargo, con el paso del tiempo, estos roles de género se han modificado e, incluso, invertido.</p>
                      <p>La mayor participación de las mujeres en la vida social, política, económica y cultural y las necesidades sociales han propiciado que <strong>las mujeres ingresen a espacios que por mucho tiempo se consideraron exclusivos para los hombres</strong>. Asimismo, ellos han tenido que participar en actividades como el cuidado de los hijos, de los adultos mayores o de los animales de compañía, lo que ha favorecido mayores vínculos emocionales y de cuidado con los demás.</p>

                      <p>Al estereotipo ideal de mujer ideal se le llama <strong>hegemónico</strong>; es decir, que sirve como guía para alcanzar lo que la sociedad y cultura de cada tiempo esperaría de lo que debe ser una mujer; del mismo modo, hay un estereotipo de hombre ideal. Sin embargo, esas formas ideales pueden poner en riesgo la identidad de la mayoría de las y los adolescentes, ya que por seguir estos modelos se llega a poner en riesgo la salud física, emocional y social.</p>
                      
                      <DiagramaGenero />
                      
                      <p>Los papeles femenino y masculino son un elemento constitutivo de la identidad personal, que cobra especial importancia durante la adolescencia. Las características atribuidas al sexo sirven para identificarse y distinguirse con los demás, pero se debe evitar reproducir discursos y actos discriminatorios o violentos entre hombres y mujeres, así como entre personas del mismo sexo.</p>
                    </div>
                  )
                },
                {
                  subtitle: "Grupos de Pertenencia, Tradiciones, Costumbres y Símbolos",
                  body: (
                    <div className="space-y-4">
                      <p>Todos los seres humanos necesitamos pertenecer a un grupo, es decir, buscamos la identificación con los integrantes de una comunidad, además de recibir su aceptación. Hay grupos a los que pertenecemos sin haberlos elegido, como la familia; no obstante, hay otros que elegimos, como los equipos deportivos, los colectivos o grupos artísticos y el círculo de amigos. Estos grupos comparten gustos, estilos de vida, formas de ser, valores, creencias, intereses u objetivos de vida que coinciden con los nuestros y que nos permiten permanecer unidos.</p>
                      <p>Algunas expresiones adolescentes y juveniles se denominan <strong>contraculturales, sub-culturas juveniles o tribus urbanas</strong>, como los góticos, cosplay, heavies, hardcores, hippies, punks, emos, rockers, hiphoperos, gamers, frikis, lolitas, mods, bakalas, indies y skins, entre otros. Éstos expresan su identidad por medio de manifestaciones artísticas (música, literatura, pintura, grafiti), y algunos desarrollan un tipo de ideología y activismo social y político (feministas, ambientalistas, comunistas, anarquistas).</p>
                      <p>Algunos grupos juveniles surgen para expresar rebeldía y distinguirse de los adultos. Sus valores, lenguaje y actividades suelen desafiar los gustos convencionales; por ello, su ropa, la letra de su música o sus actitudes son consideradas por los adultos como una provocación y a veces se les tolera poco o se les discrimina porque sus comportamientos y forma de pensar son diferentes.</p>

              { q: "La vulnerabilidad de género expone estadísticamente más a las mujeres y personas de género diverso a:", options: ["Mejores salarios", "Pérdida de identidad nacional", "Desigualdades, violencia y otras formas de discriminación", "Falta de acceso a internet"], correct: 2 },
              { q: "La desigualdad económica se define en la tabla como la desigualdad en la distribución de:", options: ["Prejuicios", "La riqueza y los recursos en ciertas comunidades", "El poder político", "Libertades de expresión"], correct: 1 }
            ]
          },
          {
            id: 'movimientos',
            title: 'Movimientos sociales',
            desc: 'Sistemas de gobierno, DDHH, violaciones y movimientos históricos en México.',
            icon: <IconFlag />,
            color: 'violet',
            content: {
              sections: [
                {
                  subtitle: "Las sociedades se organizan para exigir sus derechos",
                  body: (
                    <div className="space-y-4">
                      <p>La dignidad y los derechos humanos son principios que sirven como guías para evaluar las condiciones de vida de las personas en cualquier lugar del mundo. Participar, de manera organizada, por el respeto a la justicia social y económica, la diversidad sexual, social y cultural, la defensa del medio ambiente, la paz, la resolución no violenta de los conflictos y los valores democráticos reflejados en los derechos individuales y colectivos, son retos que, en la actualidad, al enfrentarse de manera organizada, implican empatía, cohesión entre grupos e identificación de necesidades colectivas.</p>
                      
                      <h4 className="font-bold text-slate-800 text-lg mt-6 border-b pb-2">Los Derechos Humanos</h4>
                      <p>Los derechos humanos son el conjunto de reconocimientos jurídicos, éticos y morales, así como las facultades que tiene una persona, sustentados en la dignidad humana; ejercerlos por completo es indispensable para el desarrollo integral de las personas. Estas prerrogativas las establecen las leyes, el orden jurídico nacional, nuestra Constitución Política y los tratados internacionales.</p>
                      <p>Los derechos humanos son inherentes, <strong>imprescriptibles</strong> (no pierden vigencia), universales, progresivos, indivisibles, inalienables e inviolables, por lo que no se otorgan a la persona, sino que se le reconocen como parte de sí por el sólo hecho de existir. La Oficina del Alto Comisionado de las Naciones Unidas para los Derechos Humanos (ACNUDH) los define como "inherentes a todos los seres humanos, sin distinción alguna...". Los Estados y las autoridades están obligados a promover, respetar, proteger y garantizarlos. <strong>Los derechos humanos sólo pueden ser violentados por agentes del Estado</strong>, como las autoridades, servidores o funcionarios, fuerzas policiacas o militares, ya que, según el <strong>artículo 1° constitucional</strong> (el cual establece explícitamente que en México todas las personas gozarán de los derechos humanos reconocidos en la Constitución y tratados internacionales, obligando a todas las autoridades a promover, respetar, proteger y garantizar dichos derechos), son el garante jurídico de dichos derechos.</p>

                      <table className="study-table text-sm mt-4">
                        <caption className="caption-top text-left font-bold text-slate-800 mb-2 uppercase text-base">Formas en que se violentan los derechos humanos</caption>
                        <tbody>
                          <tr>
                            <td className="w-1/4 bg-red-50"><strong className="text-red-900">Por acción</strong></td>
                            <td>Se generan cuando <strong>se ataca la dignidad humana</strong>, como detenciones arbitrarias, desapariciones forzadas, ejecuciones extrajudiciales, maltrato físico y moral o tortura.</td>
                          </tr>
                          <tr>
                            <td className="w-1/4 bg-orange-50"><strong className="text-orange-900">Por omisión</strong></td>
                            <td>Ocurren cuando los poderes de gobierno <strong>muestran indiferencia</strong> ante situaciones que vulneran la dignidad y los derechos humanos.</td>
                          </tr>
                          <tr>
                            <td className="w-1/4 bg-yellow-50"><strong className="text-yellow-900">Por aquiescencia</strong></td>
                            <td>Suceden cuando un Estado, y las autoridades que lo representan, <strong>da el consentimiento directo de permitir</strong> secuestros, agresiones físicas, psicológicas, morales y sexuales o asesinatos por parte de guardias o grupos paramilitares.</td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  )
                },
                {
                  subtitle: "Generaciones de Derechos y Movimientos",
                  body: (
                    <div className="space-y-6">
                      <table className="study-table text-xs">
                        <caption className="caption-top text-left font-bold text-slate-800 mb-2 uppercase text-base">Tabla 4.1 Generaciones de los Derechos Humanos</caption>
                        <thead>
                          <tr>
                            <th className="w-1/3 text-center">Primera generación<br/><span className="font-normal text-slate-600">Derechos civiles y políticos</span></th>
                            <th className="w-1/3 text-center">Segunda generación<br/><span className="font-normal text-slate-600">Derechos económicos, sociales y culturales</span></th>
                            <th className="w-1/3 text-center">Tercera generación<br/><span className="font-normal text-slate-600">Derechos de solidaridad</span></th>
                          </tr>
                        </thead>
                        <tbody>
                          <tr>
                            <td className="px-4">
                              <ul className="list-disc pl-2 space-y-2">
                                <li>Derecho a la vida, igualdad, libertad</li>
                                <li>Derecho a la nacionalidad, privacidad</li>
                                <li><strong>Libertad de expresión</strong> y religiosa</li>
                                <li>Derecho a un juicio justo y <strong>al sufragio</strong></li>
                              </ul>
                            </td>
                            <td className="px-4">
                              <ul className="list-disc pl-2 space-y-2">
                                <li>Derecho al trabajo, libre elección y condiciones laborales equitativas</li>
                                <li>Libertad sindical y derecho de huelga</li>
                                <li>Derecho a un nivel de vida adecuado y <strong>vivienda digna</strong></li>
                                <li>Derecho a la <strong>salud y a la educación</strong></li>
                                <li>Derecho a la vida cultural, ciencia y tecnología</li>
                              </ul>
                            </td>
                            <td className="px-4">
                              <ul className="list-disc pl-2 space-y-2">
                                <li>Derecho a la autodeterminación, independencia económica y política</li>
                                <li>Derecho a la identidad nacional y cultural, a la paz y coexistencia pacífica</li>
                                <li>Derecho a la cooperación/justicia internacional</li>
                                <li>Derecho al uso de avances científicos, al ambiente, al patrimonio común de la humanidad y desarrollo digno</li>
                              </ul>
                            </td>
                          </tr>
                        </tbody>
                      </table>

                      <p>La idea de movimiento civil va asociada a la acción colectiva, a las necesidades y demandas de la población relacionadas con el respeto de la dignidad. Los <strong>movimientos sociales</strong> realizan acciones de participación ciudadana en las cuales expresan valores, creencias e ideologías frente al descontento y la inconformidad ante las formas de actuación de un gobierno y se movilizan por los derechos y para evidenciar y poner fin a las injusticias. Buscan proponer, reivindicar y pedir mejoras en conjunto para toda la sociedad.</p>
                      <p>Los <strong>movimientos políticos</strong> buscan tener mayor participación en la toma de decisiones en el gobierno para llevar a cabo las mejoras que creen convenientes. Están conformados por un grupo con afinidad de criterios que se constituyen y accionan <strong>con el fin primordial de alcanzar el poder político</strong>.</p>
                    </div>
                  )
                },
                {
                  subtitle: "Gobiernos en América Latina y México",
                  body: (
                    <div className="space-y-4">
                      <p>En América Latina, el siglo XX se caracterizó por una marcada inestabilidad política y frecuentes golpes de Estado, que resultaron en la imposición de gobiernos autoritarios y totalitarios. Dichos regímenes se distinguieron por la concentración de poder, además de despreciar los derechos humanos y utilizar sistemáticamente la represión y la censura.</p>
                      <DiagramaGobiernos />
                      <p>Actualmente, el informe Freedom in the world 2022, de la organización Freedom House, clasifica a los países del mundo. <strong>México y Centroamérica son distinguidos como parcialmente libres</strong>. América del Norte y del Sur son mayormente libres, mientras que Europa cuenta con más naciones libres. Asia y África tienen un número mayor de países no libres.</p>

                      <h4 className="font-bold text-slate-800 text-lg mt-6 border-b pb-2">Movimientos en México</h4>
                      <p>En el caso de México, a finales del siglo XIX y principios del XX, la Revolución Mexicana buscó la democracia y el respeto de los derechos. Sin embargo, con la conclusión de la revuelta armada se instauró un orden institucional que mantuvo a un partido político en el poder por más de 70 años. El gobierno de este partido se caracterizó por imponer sus decisiones y mantener el orden público por medio de la fuerza, la represión y la violencia. Ejemplos de estas situaciones fueron las represiones sufridas en las décadas de los años 50, 60 y 70.</p>
                      
                      <table className="study-table text-xs">
                        <caption className="caption-top text-left font-bold text-slate-800 mb-2 uppercase text-base">Tabla 4.3 Movimientos Sociales y Políticos de México, Siglo XX a XXI</caption>
                        <thead>
                          <tr><th>Movimiento</th><th>Tipo de movimiento</th><th>Periodo</th><th>Demandas</th></tr>
                        </thead>
                        <tbody>
                          <tr><td className="font-bold">Ejército Cristero</td><td>Social</td><td>1926-1929</td><td>Respeto a los derechos a la profesión religiosa.</td></tr>
                          <tr><td className="font-bold">Movimiento de médicos y enfermeras</td><td>Social</td><td>1964-1965</td><td><strong>Mejores condiciones laborales.</strong></td></tr>
                          <tr><td className="font-bold">Huelga de ferrocarrileros</td><td>Social</td><td>1959</td><td>Mejores condiciones laborales.</td></tr>
                          <tr><td className="font-bold">Movimiento estudiantil de 1968</td><td>Social</td><td>1968</td><td><strong>Democratización del país.</strong></td></tr>
                          <tr><td className="font-bold">Partido de los Pobres</td><td>Político</td><td>1967-1974</td><td>Contra asesinatos de campesinos en Guerrero.</td></tr>
                          <tr><td className="font-bold">Liga Comunista 23 de Septiembre</td><td>Político</td><td>1973-1983</td><td>Construcción de un gobierno socialista.</td></tr>
                          <tr><td className="font-bold">Movimiento de Acción Revolucionaria</td><td>Político</td><td>1969-1979</td><td>Democratización del país.</td></tr>
                          <tr><td className="font-bold">Ejército Zapatista de Liberación Nacional</td><td><strong>Político</strong></td><td>1994</td><td>Derechos de los pueblos indígenas.</td></tr>
                          <tr><td className="font-bold">Consejo General de Huelga, UNAM</td><td>Social</td><td>1999-2000</td><td>Defensa de la educación pública y gratuita.</td></tr>
                          <tr><td className="font-bold">#YoSoy132</td><td>Social</td><td>2012</td><td>Contra violaciones de derechos humanos.</td></tr>
                        </tbody>
                      </table>

                      <p>Además de la brutalidad policiaca, el ejército mexicano también participó en detenciones arbitrarias, desapariciones forzadas, ejecuciones extrajudiciales, maltrato físico y moral o tortura de participantes de movimientos sociales, políticos, estudiantiles y armados, lo que se ha denominado a la fecha como <strong>Guerra Sucia</strong>.</p>
                    </div>
                  )
                }
              ]
            },
            quiz: [
              { q: "Si las autoridades permiten abiertamente y dan su consentimiento directo para que un grupo paramilitar secuestre y torture, cometen violación de derechos humanos por:", options: ["Acción", "Omisión", "Aquiescencia", "Corrupción"], correct: 2 },
              { q: "Si los poderes de gobierno muestran indiferencia ante situaciones que vulneran la dignidad y los derechos, la violación es por:", options: ["Acción", "Aquiescencia", "Marginación", "Omisión"], correct: 3 },
              { q: "De acuerdo a la Tabla 4.1, los derechos a la salud, vivienda digna y educación pertenecen a los derechos de:", options: ["Primera generación", "Segunda generación (Económicos, sociales y culturales)", "Tercera generación", "Cuarta generación"], correct: 1 },
              { q: "Según la Tabla 4.1, la 'libertad de expresión' y el 'derecho al sufragio' pertenecen a los derechos:", options: ["Civiles y políticos (Primera generación)", "De Solidaridad (Tercera generación)", "Económicos y sociales (Segunda generación)", "Culturales (Segunda generación)"], correct: 0 },
              { q: "Según el diagrama de Tipos de Gobierno, el régimen que busca eliminar las formas de pensamiento opuestas, mediante el adoctrinamiento y el uso de propaganda es el:", options: ["Democrático", "Autoritario", "Totalitario", "Conservador"], correct: 2 },
              { q: "Según la Tabla 4.3, ¿qué tipo de movimiento fue el Ejército Zapatista de Liberación Nacional (EZLN) en 1994?", options: ["Social", "Político", "Sindical", "Estudiantil"], correct: 1 },
              { q: "Según la Tabla 4.3, el movimiento estudiantil de 1968 fue de tipo 'Social' y exigía la:", options: ["Protección de derechos indígenas", "Educación pública gratuita", "Profesión religiosa", "Democratización del país"], correct: 3 },
              { q: "A diferencia de un movimiento social que busca mejoras para todos, un movimiento político se constituye y acciona con el fin primordial de:", options: ["Mejorar condiciones laborales", "Alcanzar el poder político", "Crear activismo ecológico", "Revolución religiosa"], correct: 1 },
              { q: "Según la Tabla 4.3, ¿qué demandaba el movimiento social de Médicos y enfermeras (1964-1965)?", options: ["Construcción de gobierno socialista", "Derechos indígenas", "Mejores condiciones laborales", "Alto a la violencia"], correct: 2 },
              { q: "Legal y constitucionalmente (Artículo 1°), ¿quién es el garante jurídico y el único ente que puede 'violentar' los Derechos Humanos por definición?", options: ["El crimen organizado", "Los agentes del Estado (autoridades, fuerzas policiacas o militares)", "Empresas privadas", "Cualquier civil armado"], correct: 1 }
            ]
          }
        ];

        // ==========================================
        // VISTAS DE NAVEGACIÓN (SPA)
        // ==========================================
        const Landing = ({ onSelect }) => (
          <div className="max-w-6xl mx-auto px-4 py-12 fade-in">
            <div className="text-center mb-16">
              <h1 className="text-4xl md:text-5xl font-bold text-slate-800 mb-4 font-poppins">
                Formación Cívica y Ética <span className="text-blue-600">2° Grado</span>
              </h1>
              <p className="text-lg text-slate-500 max-w-2xl mx-auto">
                Guía de Estudio Avanzada con lecturas completas y diagramas interactivos. Selecciona un tema para estudiar la teoría y ponte a prueba con el examen final.
              </p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8">
              {studyData.map((module) => (
                <div key={module.id} onClick={() => onSelect(module.id)} className={`bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-200 hover:shadow-xl hover:border-${module.color}-400 transition-all duration-300 cursor-pointer group flex flex-col items-center text-center`}>
                  <div className={`w-16 h-16 rounded-2xl bg-${module.color}-50 text-${module.color}-600 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300`}>{module.icon}</div>
                  <h2 className="text-2xl font-bold text-slate-800 mb-3 group-hover:text-blue-600 transition-colors font-poppins">{module.title}</h2>
                  <p className="text-slate-500 mb-6 flex-grow">{module.desc}</p>
                  <div className={`text-${module.color}-600 font-semibold flex items-center gap-2 uppercase tracking-wide text-sm`}>Estudiar y Evaluar &rarr;</div>
                </div>
              ))}
            </div>
          </div>
        );

        const QuizSystem = ({ questions, color }) => {
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          const [showResults, setShowResults] = useState(false);
          const [answers, setAnswers] = useState([]);
          const [selectedOption, setSelectedOption] = useState(null);

          const handleAnswer = () => {
            if (selectedOption === null) return;
            const isCorrect = selectedOption === questions[currentQ].correct;
            setAnswers([...answers, { qIndex: currentQ, selected: selectedOption, isCorrect }]);
            if (isCorrect) setScore(score + 1);
            if (currentQ < questions.length - 1) { setCurrentQ(currentQ + 1); setSelectedOption(null); } 
            else { setShowResults(true); }
          };

          const resetQuiz = () => { setCurrentQ(0); setScore(0); setShowResults(false); setAnswers([]); setSelectedOption(null); };

          if (showResults) {
            const passed = score >= 7;
            return (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 fade-in max-w-4xl mx-auto">
                <div className="text-center mb-8">
                  <h3 className="text-3xl font-bold text-slate-800 mb-2 font-poppins">Resultados del Examen</h3>
                  <div className={`inline-block px-6 py-3 rounded-full text-2xl font-bold mb-4 ${passed ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{score} / 10</div>
                  <p className="text-slate-600 font-medium">{passed ? '¡Excelente trabajo! Tienes un dominio analítico de la lectura completa y las tablas.' : 'Se recomienda volver a leer los textos íntegros y tablas en la sección teórica.'}</p>
                </div>
                <div className="space-y-6">
                  {questions.map((q, idx) => {
                    const ans = answers.find(a => a.qIndex === idx);
                    return (
                      <div key={idx} className={`p-5 rounded-xl border ${ans.isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                        <p className="font-semibold text-slate-800 mb-3">{idx + 1}. {q.q}</p>
                        <div className="text-sm space-y-2">
                          {!ans.isCorrect && <div className="flex items-start gap-2 text-red-700"><IconX /> <span className="line-through opacity-80">{q.options[ans.selected]}</span></div>}
                          <div className="flex items-start gap-2 text-green-700 font-medium"><IconCheck /> <span>{q.options[q.correct]}</span></div>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <button onClick={resetQuiz} className={`mt-8 w-full py-4 rounded-xl text-white font-bold bg-${color}-600 hover:bg-${color}-700 transition-colors`}>Reintentar Quiz</button>
              </div>
            );
          }

          const q = questions[currentQ];
          return (
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 fade-in max-w-4xl mx-auto">
              <div className="flex justify-between items-center mb-6">
                <span className={`text-${color}-600 font-bold uppercase tracking-wider text-sm`}>Pregunta {currentQ + 1} de 10</span>
                <span className="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-sm font-semibold border border-slate-200">Alta Dificultad</span>
              </div>
              <h3 className="text-xl md:text-2xl font-semibold text-slate-800 mb-8 leading-relaxed">{q.q}</h3>
              <div className="space-y-3 mb-8">
                {q.options.map((opt, idx) => (
                  <button key={idx} onClick={() => setSelectedOption(idx)} className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-center ${selectedOption === idx ? `border-${color}-500 bg-${color}-50 shadow-sm` : 'border-slate-200 hover:border-slate-300 hover:bg-slate-50'}`}>
                    <span className={`inline-flex shrink-0 w-8 h-8 rounded-full items-center justify-center font-bold mr-4 ${selectedOption === idx ? `bg-${color}-500 text-white` : 'bg-slate-200 text-slate-600'}`}>{String.fromCharCode(65 + idx)}</span>
                    <span className="font-medium text-slate-700 leading-tight">{opt}</span>
                  </button>
                ))}
              </div>
              <button onClick={handleAnswer} disabled={selectedOption === null} className={`w-full py-4 rounded-xl text-white font-bold text-lg transition-all duration-200 ${selectedOption === null ? 'bg-slate-300 cursor-not-allowed opacity-70' : `bg-${color}-600 hover:bg-${color}-700 shadow-md`}`}>
                {currentQ === 9 ? 'Finalizar Examen' : 'Siguiente Pregunta'}
              </button>
            </div>
          );
        };

        const SectionView = ({ sectionId, onBack }) => {
          const module = studyData.find(s => s.id === sectionId);
          const [viewMode, setViewMode] = useState('theory');
          useEffect(() => { window.scrollTo(0, 0); }, [viewMode]);

          return (
            <div className="max-w-6xl mx-auto px-4 py-8 fade-in">
              <button onClick={onBack} className="flex items-center gap-2 text-slate-500 hover:text-blue-600 font-medium mb-8 transition-colors bg-white px-4 py-2 rounded-lg shadow-sm border border-slate-200 inline-flex"><IconHome /> Volver al Inicio</button>

              <div className={`bg-gradient-to-r from-slate-900 to-slate-800 rounded-3xl p-8 md:p-12 mb-8 text-white shadow-xl flex items-center gap-6`}>
                <div className={`p-4 bg-white/10 rounded-2xl hidden md:block text-${module.color}-400`}>{module.icon}</div>
                <div>
                  <h1 className="text-3xl md:text-5xl font-bold mb-4 font-poppins">{module.title}</h1>
                  <p className="text-slate-300 text-lg max-w-2xl">{module.desc}</p>
                </div>
              </div>

              <div className="flex space-x-2 mb-8 bg-slate-200 p-1 rounded-xl max-w-md mx-auto">
                <button onClick={() => setViewMode('theory')} className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-semibold transition-colors ${viewMode === 'theory' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'}`}><IconBook /> Teoría y Tablas</button>
                <button onClick={() => setViewMode('quiz')} className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-semibold transition-colors ${viewMode === 'quiz' ? `bg-${module.color}-600 text-white shadow-sm` : 'text-slate-500 hover:text-slate-700'}`}><IconCheck /> Quiz Evaluativo</button>
              </div>

              {viewMode === 'theory' ? (
                <div className="fade-in space-y-8 max-w-5xl mx-auto">
                  {module.content.sections.map((sec, idx) => (
                    <div key={idx} className="bg-white rounded-2xl p-6 md:p-10 shadow-sm border border-slate-200 overflow-hidden">
                      <h3 className={`text-2xl font-bold text-${module.color}-700 mb-6 border-b-2 border-slate-100 pb-3 font-poppins`}>{sec.subtitle}</h3>
                      <div className="text-slate-800 text-base leading-relaxed">{sec.body}</div>
                    </div>
                  ))}
                </div>
              ) : ( <QuizSystem questions={module.quiz} color={module.color} /> )}
            </div>
          );
        };

        const App = () => {
          const [currentView, setCurrentView] = useState('landing');
          const [activeSection, setActiveSection] = useState(null);
          const navigateToSection = (id) => { setActiveSection(id); setCurrentView('section'); window.scrollTo(0,0); };
          return <div>{currentView === 'landing' ? <Landing onSelect={navigateToSection} /> : <SectionView sectionId={activeSection} onBack={() => setCurrentView('landing')} />}</div>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
