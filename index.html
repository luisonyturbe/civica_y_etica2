<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Estudio 2° Grado</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        h1, h2, h3, h4, .font-poppins { font-family: 'Poppins', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Íconos SVG ---
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconHeart = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;
        const IconGlobe = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>;
        const IconFlag = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>;
        const IconHome = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;

        // --- Datos de Estudio y Quizzes ---
        const studyData = [
          {
            id: 'identidad',
            title: 'Construyo mi identidad',
            desc: 'Análisis de la identidad, género, roles sociales y tradiciones culturales.',
            icon: <IconUser />,
            color: 'blue',
            content: {
              summary: [
                "La identidad personal es el conjunto de rasgos que nos diferencian. Según Martin Buber, es relativamente estable pero se construye en un entorno social y se reafirma mediante la convivencia (alteridad).",
                "Nuestra identidad se ve influenciada por nuestro género (construcción sociocultural) y los roles asociados. Además, los grupos de pertenencia (familia, amigos, tribus urbanas) y las tradiciones heredadas forjan nuestro sentido de pertenencia."
              ],
              keywords: [
                { term: "Identidad personal", def: "Conjunto de características que nos hacen únicos. Se reafirma en la convivencia." },
                { term: "Género vs Sexo", def: "Sexo es biológico; género es una construcción sociocultural que asocia roles a lo masculino/femenino." },
                { term: "Tradiciones y Costumbres", def: "Tradiciones se heredan (generan sincretismo). Costumbres son hábitos que regulan la comunidad; incumplirlas genera censura moral." },
                { term: "Símbolos", def: "Expresiones, objetos o imágenes que evocan valores de un pueblo o grupo, brindando identidad compartida." }
              ]
            },
            quiz: [
              { q: "Según Martin Buber, ¿cuál de estas características NO pertenece a la identidad personal?", options: ["Se construye en un entorno social.", "Es relativamente estable a lo largo de la vida.", "Es inmutable y se define genéticamente al nacer.", "Se reafirma en la convivencia con los demás."], correct: 2 },
              { q: "¿Cuál es la diferencia fundamental entre sexo y género según el texto?", options: ["El género es biológico y el sexo cultural.", "El sexo es una construcción social, el género es psicológico.", "Ambos términos significan exactamente lo mismo.", "El sexo son diferencias biológicas, el género es una construcción social y cultural."], correct: 3 },
              { q: "Al estereotipo ideal de mujer u hombre que sirve como guía social en una época se le denomina:", options: ["Estereotipo marginal", "Estereotipo subalterno", "Estereotipo hegemónico", "Estereotipo transicional"], correct: 2 },
              { q: "¿Qué nombre reciben las agrupaciones juveniles que expresan rebeldía y cuyos valores desafían los gustos convencionales?", options: ["Cofradías", "Contraculturales o tribus urbanas", "Grupos hegemónicos", "Sindicatos juveniles"], correct: 1 },
              { q: "La combinación de antiguas tradiciones prehispánicas con creencias de la religión católica es un ejemplo de:", options: ["Dogmatismo", "Etnocentrismo", "Segregación", "Sincretismo"], correct: 3 },
              { q: "A diferencia de una ley, cuando se incumple una costumbre arraigada, la consecuencia suele ser:", options: ["Multa económica", "Prisión preventiva", "Repercusiones morales y sociales como censura", "Exilio legal del país"], correct: 2 },
              { q: "¿Qué elemento cultural evoca valores, sentimientos y creencias mediante objetos, imágenes o rituales?", options: ["Costumbres", "Símbolos", "Leyes", "Normas"], correct: 1 },
              { q: "¿Qué provocó que las mujeres ingresaran a espacios que antes se consideraban exclusivos para hombres?", options: ["La biología evolutiva.", "Mayor participación en la vida social, política y económica, y necesidades sociales.", "Prohibiciones legales hacia los hombres.", "El declive de las tribus urbanas."], correct: 1 },
              { q: "En la DSI (Doctrina Social), la visión sobre el género sostiene que:", options: ["Debe separarse totalmente de la biología.", "Es una realidad integral arraigada en lo biológico, promoviendo la complementariedad.", "Hombres y mujeres son competidores naturales.", "Los roles deben ser estrictamente rígidos y no modificables."], correct: 1 },
              { q: "¿Qué característica define a los grupos de pertenencia que elegimos (como amigos o tribus urbanas)?", options: ["Están definidos desde el nacimiento.", "Comparten genéticas similares.", "Comparten gustos, estilos de vida, valores o creencias.", "Son impuestos por el Estado."], correct: 2 }
            ]
          },
          {
            id: 'salud',
            title: 'Derecho a la salud',
            desc: 'Autoestima, asertividad, autorregulación y prevención de adicciones.',
            icon: <IconHeart />,
            color: 'rose',
            content: {
              summary: [
                "El Estado tiene la obligación constitucional (Art. 4) de garantizar la salud integral. Sin embargo, el primer anillo de seguridad es individual: el autocuidado, que es la manifestación directa de la autoestima.",
                "Las adicciones son dependencias psicofísicas crónicas. La asertividad (saber decir no con respeto) y la autorregulación (evitar acciones riesgosas aunque se deseen) son habilidades críticas para resistir la presión de pares en la adolescencia."
              ],
              keywords: [
                { term: "Salud integral (OMS)", def: "Bienestar físico, mental y social. No solo la ausencia de afecciones o enfermedades." },
                { term: "Autocuidado", def: "Manifestación práctica de la autoestima. Significa valorarse lo suficiente como para protegerse." },
                { term: "Autorregulación", def: "Capacidad de frenar impulsos y evitar acciones que desemboquen en problemas irreversibles." },
                { term: "Adicción", def: "Dependencia constante y crónica (psicofísica) hacia sustancias o conductas. Consumo ocasional NO es adicción." }
              ]
            },
            quiz: [
              { q: "Según la OMS, la salud integral se define como:", options: ["Únicamente la ausencia de dolor físico.", "El bienestar físico, mental y social.", "Tener acceso a hospitales de alta especialidad.", "Poseer un alto rendimiento deportivo."], correct: 1 },
              { q: "¿Qué ley en México, en su artículo 50, obliga a prevenir, atender y rehabilitar problemas por adicciones?", options: ["Constitución Política", "Ley General de Educación", "Ley General de los Derechos de Niñas, Niños y Adolescentes", "Ley General de Salud Pública"], correct: 2 },
              { q: "¿Qué habilidad social te permite exponer tus verdaderos deseos, decir 'no' y defender tus derechos sin ser agresivo?", options: ["Autoestima", "Autorregulación", "Asertividad", "Simpatía"], correct: 2 },
              { q: "El autocuidado es considerado una manifestación directa de:", options: ["El Estado", "La asertividad", "La autorregulación", "La autoestima"], correct: 3 },
              { q: "Médicamente y según el texto, ¿qué diferencia a un consumidor ocasional de un adicto?", options: ["El adicto consume drogas legales, el ocasional ilegales.", "El adicto presenta dependencia psicofísica constante y crónica.", "No hay diferencia, probar una vez te hace adicto.", "El consumidor ocasional tiene peor salud mental."], correct: 1 },
              { q: "En la clasificación del texto, ¿qué par de drogas son consideradas 'Blandas'?", options: ["Mariguana y Hongos", "Cocaína y Morfina", "Fentanilo y Crack", "Alcohol y Tabaco"], correct: 1 },
              { q: "Según la Encodat, ¿cuál es la causa principal por la que los adolescentes inician el consumo de sustancias?", options: ["Problemas genéticos", "Deseo de pertenecer a un grupo y ser aceptados", "Desconocimiento absoluto de sus efectos", "Falta de recursos económicos"], correct: 1 },
              { q: "Identifica un ejemplo de adicción conductual o emocional:", options: ["Heroína", "Tabaquismo", "Relaciones de codependencia destructivas", "Inhalantes"], correct: 2 },
              { q: "La capacidad para identificar obstáculos y evitar acciones que ponen en riesgo tu integridad, aunque sientas gran deseo de realizarlas, se llama:", options: ["Catarsis", "Abstinencia", "Asertividad", "Autorregulación"], correct: 3 },
              { q: "¿Qué efecto a largo plazo suele provocar el uso de drogas como 'vía de escape' para el estrés?", options: ["Inmunidad a la ansiedad", "Aumento de la inteligencia cognitiva", "Exacerbación de problemas y provocación de depresión/trastornos mentales", "Mejora de la asertividad"], correct: 2 }
            ]
          },
          {
            id: 'vulnerables',
            title: 'Comunidades vulnerables',
            desc: 'Dignidad humana, marginación, desigualdad estructural y factores de riesgo.',
            icon: <IconGlobe />,
            color: 'emerald',
            content: {
              summary: [
                "La dignidad humana es el pilar de los derechos humanos (Art. 1 DUDH). Implica Igualdad, Autonomía, Integridad y Trato Digno para todo ser humano sin importar su origen.",
                "La marginación ocurre por factores estructurales (discriminación, falta de servicios, desigualdad) que vulneran a ciertos grupos. La vulnerabilidad infantil, por ejemplo, nace de la falta de autonomía y dependencia de los adultos."
              ],
              keywords: [
                { term: "Dignidad Humana", def: "Valor inherente e inalienable. Todos merecen trato justo e igualitario." },
                { term: "Marginación", def: "Exclusión a un estatus inferior. Impide acceso a educación, salud y oportunidades." },
                { term: "Barreras Estructurales", def: "Fallas institucionales (como segregación de vivienda o servicios) que perpetúan la pobreza." },
                { term: "Vulnerabilidad Infantil", def: "Riesgo originado por la dependencia de adultos y falta de capacidad para defender derechos propios." }
              ]
            },
            quiz: [
              { q: "¿Qué concepto afirma que cada individuo posee un valor inherente e inalienable que exige trato justo?", options: ["Empatía social", "Dignidad humana", "Soberanía estatal", "Tolerancia cultural"], correct: 1 },
              { q: "Según el texto, ¿qué provoca directamente la desigualdad en la distribución de la riqueza en ciertas comunidades?", options: ["Menos acceso al empleo, educación y atención médica (Marginación).", "Aumento de la autonomía infantil.", "Erradicación de la estigmatización.", "Mejora de la integridad psicológica."], correct: 0 },
              { q: "El Artículo 1° de la Declaración Universal de los Derechos Humanos menciona que todos los seres humanos nacen:", options: ["Libres y diferentes en derechos.", "Sujetos a las barreras estructurales de su país.", "Libres e iguales en dignidad y derechos.", "Con vulnerabilidad económica inherente."], correct: 2 },
              { q: "¿Por qué los niños, niñas y adolescentes son un grupo especialmente vulnerable?", options: ["Por falta de educación.", "Debido a su dependencia de los adultos y poca capacidad de autonomía.", "Porque no tienen derechos humanos asignados aún.", "Por barreras estructurales exclusivas de las escuelas."], correct: 1 },
              { q: "La prohibición de la tortura y los tratos inhumanos es una exigencia del aspecto de la dignidad conocido como:", options: ["Integridad", "Autonomía", "Igualdad", "Libertad de expresión"], correct: 0 },
              { q: "La falta de servicios básicos como agua potable o internet en zonas limítrofes es un ejemplo de:", options: ["Discriminación explícita", "Vulnerabilidad de género", "Estigmatización social", "Barreras institucionales/estructurales"], correct: 3 },
              { q: "¿Qué componente de la dignidad exige que cada persona tenga capacidad de tomar decisiones libres sobre su propia vida?", options: ["Trato digno", "Autonomía", "Integridad", "Asertividad"], correct: 1 },
              { q: "¿Qué implica socialmente erradicar la marginación social?", options: ["Eliminar fronteras nacionales.", "Establecer políticas antidiscriminación e igualdad de oportunidades.", "Privatizar la atención médica.", "Forzar la asimilación cultural de etnias."], correct: 1 },
              { q: "Aislar a personas o grupos al percibirlos como 'diferentes' (ej. orientación sexual distinta) contribuye a la marginación mediante:", options: ["Estigmatización social", "Vulnerabilidad económica", "Barrera estructural", "Desigualdad de riqueza"], correct: 0 },
              { q: "La vulnerabilidad de género expone principalmente a las mujeres y personas de género diverso a:", options: ["Alta carga tributaria.", "Violencia y otras formas de discriminación.", "Pérdida de nacionalidad.", "Sobreprotección estatal."], correct: 1 }
            ]
          },
          {
            id: 'movimientos',
            title: 'Movimientos sociales',
            desc: 'Derechos humanos, formas de violación y participación sociopolítica.',
            icon: <IconFlag />,
            color: 'violet',
            content: {
              summary: [
                "Los derechos humanos son inherentes e imprescriptibles. Constitucionalmente, solo pueden ser violados por agentes del Estado mediante tres vías: Acción, Omisión o Aquiescencia.",
                "Frente a abusos de poder y regímenes autoritarios o totalitarios, las sociedades crean movimientos sociales (para reivindicar derechos y exigir justicia civil) o movimientos políticos (que buscan alcanzar el poder político)."
              ],
              keywords: [
                { term: "Violación por Omisión", def: "El Estado muestra indiferencia ante situaciones que vulneran la dignidad humana." },
                { term: "Violación por Aquiescencia", def: "El Estado o autoridades dan el consentimiento/permiso tácito para que terceros cometan agresiones." },
                { term: "Gobierno Autoritario vs Totalitario", def: "Autoritario reprime opositores. Totalitario busca eliminar pensamiento opuesto adoctrinando a la población." },
                { term: "Generaciones de DDHH", def: "1ra: Civiles/Políticos. 2da: Económicos/Sociales (Salud, Trabajo). 3ra: Solidaridad (Paz, Ambiente)." }
              ]
            },
            quiz: [
              { q: "Según la ACNUDH, ¿quiénes son los únicos que pueden violentar los derechos humanos de forma oficial?", options: ["Los delincuentes comunes.", "Los agentes del Estado (autoridades, militares, policías).", "Los grupos opositores políticos.", "Cualquier ciudadano en propiedad privada."], correct: 1 },
              { q: "Si el gobierno muestra indiferencia y no interviene ante una situación que vulnera la dignidad ciudadana, comete una violación por:", options: ["Acción", "Corrupción", "Omisión", "Aquiescencia"], correct: 2 },
              { q: "Si las autoridades dan consentimiento directo a un grupo paramilitar para secuestrar, es una violación de derechos por:", options: ["Acción", "Omisión", "Inmunidad", "Aquiescencia"], correct: 3 },
              { q: "¿A qué generación de Derechos Humanos pertenece el 'Derecho a la salud y a la educación'?", options: ["Primera generación", "Segunda generación", "Tercera generación", "Cuarta generación"], correct: 1 },
              { q: "¿Qué derecho es representativo de la Primera Generación (Derechos civiles y políticos)?", options: ["Derecho al medio ambiente", "Libertad de expresión y derecho a la vida", "Derecho a la vivienda digna", "Derecho al patrimonio de la humanidad"], correct: 1 },
              { q: "¿Cuál es el fin primordial de un 'Movimiento Político' a diferencia de uno social?", options: ["Evidenciar injusticias ecológicas.", "Visibilizar derechos de minorías.", "Alcanzar el poder político y gobernar.", "Crear arte urbano contracultural."], correct: 2 },
              { q: "Un gobierno que no solo reprime, sino que busca eliminar formas de pensamiento opuestas mediante adoctrinamiento y propaganda es un gobierno:", options: ["Democrático", "Autoritario", "Totalitario", "Hegemónico"], correct: 2 },
              { q: "Según el informe Freedom House 2022, México está clasificado políticamente como un país:", options: ["Totalmente libre", "Parcialmente libre", "No libre", "Autoritario"], correct: 1 },
              { q: "En México, la etapa de represión brutal, desapariciones y torturas entre los años 50s y 70s se conoce como:", options: ["Guerra Cristera", "Revolución de Ayutla", "Guerra Sucia", "El Maximato"], correct: 2 },
              { q: "Los Derechos Humanos se consideran 'imprescriptibles' porque:", options: ["No se pueden vender ni transferir.", "Se reconocen por el hecho de existir.", "No se pueden dividir ni jerarquizar.", "No pierden vigencia ni caducan con el paso del tiempo."], correct: 3 }
            ]
          }
        ];

        // --- Componente: Landing Page ---
        const Landing = ({ onSelect }) => (
          <div className="max-w-6xl mx-auto px-4 py-12 fade-in">
            <div className="text-center mb-16">
              <h1 className="text-4xl md:text-5xl font-bold text-slate-800 mb-4 font-poppins">
                Formación Cívica y Ética <span className="text-blue-600">2° Grado</span>
              </h1>
              <p className="text-lg text-slate-500 max-w-2xl mx-auto">
                Plataforma interactiva para dominar los temas clave. Repasa la teoría y ponte a prueba con nuestro simulador de examen de alta dificultad.
              </p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8">
              {studyData.map((module) => (
                <div 
                  key={module.id}
                  onClick={() => onSelect(module.id)}
                  className={`bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-200 hover:shadow-xl hover:border-${module.color}-300 transition-all duration-300 cursor-pointer group flex flex-col items-center text-center`}
                >
                  <div className={`w-16 h-16 rounded-2xl bg-${module.color}-50 text-${module.color}-600 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300`}>
                    {module.icon}
                  </div>
                  <h2 className="text-2xl font-bold text-slate-800 mb-3 group-hover:text-blue-600 transition-colors font-poppins">
                    {module.title}
                  </h2>
                  <p className="text-slate-500 mb-6 flex-grow">{module.desc}</p>
                  <div className={`text-${module.color}-600 font-semibold flex items-center gap-2 uppercase tracking-wide text-sm`}>
                    Estudiar y Evaluar &rarr;
                  </div>
                </div>
              ))}
            </div>
          </div>
        );

        // --- Componente: Quiz Interactivo ---
        const QuizSystem = ({ questions, color }) => {
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          const [showResults, setShowResults] = useState(false);
          const [answers, setAnswers] = useState([]);
          const [selectedOption, setSelectedOption] = useState(null);

          const handleAnswer = () => {
            if (selectedOption === null) return;
            
            const isCorrect = selectedOption === questions[currentQ].correct;
            setAnswers([...answers, { qIndex: currentQ, selected: selectedOption, isCorrect }]);
            
            if (isCorrect) setScore(score + 1);
            
            if (currentQ < questions.length - 1) {
              setCurrentQ(currentQ + 1);
              setSelectedOption(null);
            } else {
              setShowResults(true);
            }
          };

          const resetQuiz = () => {
            setCurrentQ(0);
            setScore(0);
            setShowResults(false);
            setAnswers([]);
            setSelectedOption(null);
          };

          if (showResults) {
            const passed = score >= 7;
            return (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 fade-in">
                <div className="text-center mb-8">
                  <h3 className="text-3xl font-bold text-slate-800 mb-2 font-poppins">Resultados del Test</h3>
                  <div className={`inline-block px-6 py-3 rounded-full text-2xl font-bold mb-4 ${passed ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                    {score} / 10
                  </div>
                  <p className="text-slate-600 font-medium">
                    {passed ? '¡Excelente trabajo! Tienes un dominio avanzado del tema.' : 'Te sugerimos repasar la sección teórica para reforzar los conceptos.'}
                  </p>
                </div>
                
                <div className="space-y-6">
                  {questions.map((q, idx) => {
                    const ans = answers.find(a => a.qIndex === idx);
                    return (
                      <div key={idx} className={`p-5 rounded-xl border ${ans.isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                        <p className="font-semibold text-slate-800 mb-3">{idx + 1}. {q.q}</p>
                        <div className="text-sm space-y-2">
                          {!ans.isCorrect && (
                            <div className="flex items-start gap-2 text-red-700">
                              <IconX /> <span className="line-through opacity-80">{q.options[ans.selected]}</span>
                            </div>
                          )}
                          <div className="flex items-start gap-2 text-green-700 font-medium">
                            <IconCheck /> <span>{q.options[q.correct]}</span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <button onClick={resetQuiz} className={`mt-8 w-full py-4 rounded-xl text-white font-bold bg-${color}-600 hover:bg-${color}-700 transition-colors`}>
                  Reintentar Quiz
                </button>
              </div>
            );
          }

          const q = questions[currentQ];
          return (
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 fade-in">
              <div className="flex justify-between items-center mb-6">
                <span className={`text-${color}-600 font-bold uppercase tracking-wider text-sm`}>Pregunta {currentQ + 1} de 10</span>
                <span className="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-sm font-semibold">Nivel Avanzado</span>
              </div>
              
              <h3 className="text-xl md:text-2xl font-semibold text-slate-800 mb-8">{q.q}</h3>
              
              <div className="space-y-3 mb-8">
                {q.options.map((opt, idx) => (
                  <button
                    key={idx}
                    onClick={() => setSelectedOption(idx)}
                    className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-center ${
                      selectedOption === idx 
                        ? `border-${color}-500 bg-${color}-50` 
                        : 'border-slate-200 hover:border-slate-300 hover:bg-slate-50'
                    }`}
                  >
                    <span className={`inline-flex shrink-0 w-8 h-8 rounded-full items-center justify-center font-bold mr-3 ${
                      selectedOption === idx ? `bg-${color}-500 text-white` : 'bg-slate-200 text-slate-600'
                    }`}>
                      {String.fromCharCode(65 + idx)}
                    </span>
                    <span className="font-medium text-slate-700 leading-tight">{opt}</span>
                  </button>
                ))}
              </div>

              <button 
                onClick={handleAnswer}
                disabled={selectedOption === null}
                className={`w-full py-4 rounded-xl text-white font-bold text-lg transition-colors ${
                  selectedOption === null 
                    ? 'bg-slate-300 cursor-not-allowed' 
                    : `bg-${color}-600 hover:bg-${color}-700 shadow-md`
                }`}
              >
                {currentQ === 9 ? 'Finalizar Examen' : 'Siguiente Pregunta'}
              </button>
            </div>
          );
        };

        // --- Componente: Vista de Sección (Teoría + Quiz) ---
        const SectionView = ({ sectionId, onBack }) => {
          const module = studyData.find(s => s.id === sectionId);
          const [viewMode, setViewMode] = useState('theory');

          useEffect(() => { window.scrollTo(0, 0); }, [viewMode]);

          return (
            <div className="max-w-5xl mx-auto px-4 py-8 fade-in">
              {/* Navegación Superior */}
              <button onClick={onBack} className="flex items-center gap-2 text-slate-500 hover:text-blue-600 font-medium mb-8 transition-colors">
                <IconHome /> Volver al Inicio
              </button>

              {/* Cabecera */}
              <div className={`bg-gradient-to-r from-slate-900 to-slate-800 rounded-3xl p-8 md:p-12 mb-8 text-white shadow-xl flex items-center gap-6`}>
                <div className={`p-4 bg-white/10 rounded-2xl hidden md:block text-${module.color}-400`}>
                  {module.icon}
                </div>
                <div>
                  <h1 className="text-3xl md:text-5xl font-bold mb-4 font-poppins">{module.title}</h1>
                  <p className="text-slate-300 text-lg max-w-2xl">{module.desc}</p>
                </div>
              </div>

              {/* Pestañas de Navegación */}
              <div className="flex space-x-2 mb-8 bg-slate-200 p-1 rounded-xl">
                <button 
                  onClick={() => setViewMode('theory')}
                  className={`flex-1 py-3 px-4 rounded-lg font-semibold transition-colors ${viewMode === 'theory' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500 hover:text-slate-700'}`}
                >
                  Documento de Estudio
                </button>
                <button 
                  onClick={() => setViewMode('quiz')}
                  className={`flex-1 py-3 px-4 rounded-lg font-semibold transition-colors ${viewMode === 'quiz' ? `bg-${module.color}-600 text-white shadow-sm` : 'text-slate-500 hover:text-slate-700'}`}
                >
                  Evaluar Conocimiento (Quiz)
                </button>
              </div>

              {/* Contenido Dinámico */}
              {viewMode === 'theory' ? (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 fade-in">
                  <div className="md:col-span-2 space-y-6">
                    <div className="bg-white rounded-2xl p-8 shadow-sm border border-slate-200">
                      <h3 className={`text-2xl font-bold text-${module.color}-600 mb-6 border-b border-slate-100 pb-4 font-poppins`}>
                        Resumen Estratégico
                      </h3>
                      <div className="space-y-4 text-slate-700 text-lg leading-relaxed">
                        {module.content.summary.map((p, i) => <p key={i}>{p}</p>)}
                      </div>
                    </div>
                  </div>
                  
                  <div className="space-y-4">
                    <h3 className="font-bold text-slate-800 text-xl mb-4 px-2 font-poppins">Conceptos Clave</h3>
                    {module.content.keywords.map((kw, i) => (
                      <div key={i} className={`bg-white p-5 rounded-xl shadow-sm border-l-4 border-${module.color}-500 hover:shadow-md transition-shadow`}>
                        <h4 className="font-bold text-slate-800 mb-2">{kw.term}</h4>
                        <p className="text-sm text-slate-600 leading-relaxed">{kw.def}</p>
                      </div>
                    ))}
                  </div>
                </div>
              ) : (
                <QuizSystem questions={module.quiz} color={module.color} />
              )}
            </div>
          );
        };

        // --- App Main Component ---
        const App = () => {
          const [currentView, setCurrentView] = useState('landing');
          const [activeSection, setActiveSection] = useState(null);

          const navigateToSection = (id) => {
            setActiveSection(id);
            setCurrentView('section');
            window.scrollTo(0,0);
          };

          return (
            <div>
              {currentView === 'landing' 
                ? <Landing onSelect={navigateToSection} /> 
                : <SectionView sectionId={activeSection} onBack={() => setCurrentView('landing')} />
              }
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
